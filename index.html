<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>URA v0.9 – U ARE ADVISOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg-primary: #0A0A0C;
            --bg-secondary: #111114;
            --bg-tertiary: #16161A;
            --border-subtle: #222228;
            --text-primary: #EDEDEF;
            --text-secondary: #9898A0;
            --text-tertiary: #5C5C66;
            --accent-green: #10B981;
            --accent-red: #EF4444;
            --accent-blue: #3B82F6;
            --accent-purple: #8B5CF6;
            --accent-orange: #F59E0B;
            --accent-gold: #FBBF24;
            --accent-cyan: #00BFFF;
            --success: #22C55E;
            --warning: #F97316;
            --danger: #DC2626;
            --silver-line: #3A3A40;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            position: fixed; 
            top: 0; 
            left: 0; 
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            padding: 12px 16px;
            gap: 8px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }
        
        .logo-section { display: flex; align-items: baseline; gap: 10px; }
        .logo { font-weight: 700; font-size: 0.95rem; letter-spacing: -0.3px; color: var(--text-primary); }
        .logo-accent { color: var(--accent-cyan); font-weight: 800; }
        .version-tag { font-size: 0.55rem; font-weight: 600; color: var(--accent-cyan); background: rgba(0, 191, 255, 0.1); padding: 2px 8px; border-radius: 100px; border: 1px solid rgba(0, 191, 255, 0.2); }
        .connection-badge { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; font-weight: 500; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); transition: all 0.2s ease; }
        .status-dot.live { background: var(--success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); animation: pulse 2s infinite; }
        .status-dot.connecting { background: var(--warning); animation: pulse 1.5s infinite; }
        .status-dot.reconnect { background: var(--accent-orange); animation: pulse 1s infinite; }
        .status-dot.fallback { background: var(--accent-blue); animation: pulse 1.5s infinite; }
        .status-dot.stale { background: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .nav-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 8px; }
        .tab-group { display: flex; gap: 3px; background: var(--bg-secondary); padding: 3px; border-radius: 8px; border: 1px solid var(--border-subtle); flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: var(--text-tertiary); padding: 5px 12px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.15s ease; white-space: nowrap; display: inline-flex; align-items: baseline; gap: 2px; }
        .tab-btn.active { color: var(--text-primary); background: var(--bg-tertiary); }
        .tf-label { transition: color 0.15s ease; }
        .tab-btn.active .tf-label { color: var(--text-primary); }
        .tf-bias-symbol { font-weight: 600; }
        .tf-bias-symbol.bullish { color: var(--accent-green); }
        .tf-bias-symbol.bearish { color: var(--accent-red); }
        .tf-bias-symbol.neutral { color: var(--text-tertiary); }
        
        .mode-row { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 6px; }
        .mode-btn { background: var(--bg-secondary); border: 1px solid var(--border-subtle); color: var(--text-tertiary); padding: 7px 12px; font-size: 0.55rem; font-weight: 700; cursor: pointer; border-radius: 4px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 5px; letter-spacing: 0.3px; }
        .mode-btn.active { background: var(--bg-tertiary); border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 6px rgba(0,191,255,0.3); }
        
        .signal-bar { background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 4px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; cursor: pointer; transition: all 0.2s; }
        .signal-content { display: flex; align-items: baseline; gap: 12px; }
        .signal-badge { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--accent-gold); letter-spacing: 0.5px; }
        .signal-text { font-size: 0.85rem; font-weight: 700; letter-spacing: -0.3px; }
        .signal-arrow { font-size: 1.2rem; font-weight: 300; line-height: 1; }
        
        .price-section { display: flex; align-items: baseline; justify-content: space-between; padding: 4px 0; flex-shrink: 0; }
        .price-main { font-size: 2rem; font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
        .price-decimal { font-size: 1.5rem; opacity: 0.5; font-weight: 500; }
        .price-change { font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 100px; background: var(--bg-secondary); }
        
        .metrics-duo { display: flex; gap: 6px; flex-shrink: 0; }
        .metric-card { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 8px 10px; }
        .metric-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .metric-label { font-size: 0.55rem; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); }
        .metric-value { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; }
        .metric-sub { font-size: 0.55rem; color: var(--text-secondary); }
        .adx-warning { color: var(--warning) !important; }
        
        .rsi-bar-container { background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 8px 12px; flex-shrink: 0; cursor: pointer; }
        .rsi-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .rsi-bar-title { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); }
        .rsi-bar-value { font-size: 0.7rem; font-weight: 700; color: var(--text-primary); }
        .rsi-track { height: 2px; background: var(--bg-tertiary); border-radius: 100px; overflow: hidden; margin: 6px 0 4px; }
        .rsi-fill { height: 100%; width: 50%; border-radius: 100px; transition: width 0.3s ease; }
        .rsi-fill.oversold { background: var(--accent-green); }
        .rsi-fill.neutral { background: var(--text-tertiary); }
        .rsi-fill.overbought { background: var(--accent-red); }
        .rsi-labels { display: flex; justify-content: space-between; font-size: 0.45rem; color: var(--text-tertiary); }
        
        .levels-grid-vertical { display: flex; flex-direction: column; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 8px 12px; flex-shrink: 0; gap: 6px; }
        .level-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline; 
            cursor: pointer; 
            padding: 2px 0; 
            border-bottom: 1px dashed var(--border-subtle);
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        .level-row:active { background: transparent; }
        .level-row:last-child { border-bottom: none; }
        .level-label-lg { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0; }
        .level-value-lg { font-size: 0.65rem; font-weight: 700; color: var(--text-primary); text-align: right; font-family: 'Inter', monospace; letter-spacing: 0.2px; }
        
        .divider-silver { height: 1px; background: var(--silver-line); margin: 4px 0; flex-shrink: 0; }
        
        .console-f12 {
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 0.5rem;
            color: var(--text-tertiary);
            padding: 4px 0;
            line-height: 1.5;
            flex-shrink: 0;
            max-height: 80px;
            overflow-y: auto;
            user-select: text;
            -webkit-user-select: text;
        }
        .console-line { 
            display: flex; 
            gap: 6px; 
            cursor: pointer;
            padding: 1px 0;
            user-select: text;
            -webkit-user-select: text;
        }
        .console-line:active { background: rgba(0, 191, 255, 0.1); }
        .console-prompt { color: var(--accent-cyan); flex-shrink: 0; }
        .console-cmd { color: var(--text-secondary); flex-shrink: 0; }
        .console-output { color: var(--accent-green); word-break: break-all; }
        .console-output.bearish { color: var(--accent-red); }
        
        .footer-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 5px; flex-shrink: 0; gap: 8px; flex-wrap: wrap; }
        .footer-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .session-info { display: flex; gap: 10px; font-size: 0.55rem; }
        .session-label { color: var(--text-tertiary); margin-right: 4px; }
        .session-value { font-weight: 600; color: var(--text-secondary); }
        .clock { font-size: 0.65rem; font-weight: 700; color: var(--text-tertiary); }
        
        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }
        .text-gold { color: var(--accent-gold); }
        .text-blue { color: var(--accent-blue); }
        
        @media (max-width: 480px) {
            .footer-left { gap: 8px; }
            .session-info { gap: 6px; }
            .tab-btn { padding: 4px 8px; font-size: 0.65rem; }
            .mode-btn { padding: 7px 8px; font-size: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <span class="logo">URA · U ARE ADVISOR</span>
            <span class="version-tag">v0.9</span>
        </div>
        <div class="connection-badge">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">CONNECTING</span>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="tab-group">
            <button class="tab-btn active" data-pair="XAUUSDT">XAUUSD</button>
            <button class="tab-btn" data-pair="BTCUSDT">BTCUSD</button>
        </div>
        <div class="tab-group" id="tf-group">
            <button class="tab-btn tf-btn" data-tf="4h"><span class="tf-label">H4</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn" data-tf="1h"><span class="tf-label">H1</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn active" data-tf="15m"><span class="tf-label">M15</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn" data-tf="5m"><span class="tf-label">M5</span><span class="tf-bias-symbol"></span></button>
        </div>
    </nav>

    <div class="mode-row">
        <button class="mode-btn" data-mode="conservative">🛡️ CONSERVATIVE</button>
        <button class="mode-btn" data-mode="sniper">🎯 SNIPER</button>
    </div>

    <div class="signal-bar" id="signal-bar" onclick="copyText('decision-status')">
        <div class="signal-content">
            <span class="signal-badge">SIGNAL</span>
            <span class="signal-text" id="decision-status">ANALYZING</span>
        </div>
        <div class="signal-arrow" id="direction-arrow">—</div>
    </div>

    <div class="price-section">
        <div class="price-main" id="live-price">0.00</div>
        <div class="price-change" id="price-change"></div>
    </div>

    <div class="metrics-duo">
        <div class="metric-card">
            <div class="metric-header"><span class="metric-label">EMA 21</span><span id="ema-trend">—</span></div>
            <div class="metric-value" id="ema-value">—</div>
            <div class="metric-sub" id="ema-distance">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-header"><span class="metric-label">ADX / DI</span><span id="adx-trend">—</span></div>
            <div class="metric-value" id="adx-value">—</div>
            <div class="metric-sub" id="di-values">—</div>
        </div>
    </div>

    <div class="rsi-bar-container" id="rsi-bar-container" onclick="copyText('rsi-bar-value')">
        <div class="rsi-bar-header">
            <span class="rsi-bar-title">RSI (14)</span>
            <span class="rsi-bar-value" id="rsi-bar-value">—</span>
        </div>
        <div class="rsi-track"><div class="rsi-fill" id="rsi-fill"></div></div>
        <div class="rsi-labels"><span>OVERSOLD (30)</span><span>NEUTRAL</span><span>OVERBOUGHT (70)</span></div>
    </div>

    <div class="levels-grid-vertical" id="levels-grid">
        <div class="level-row" onclick="copyText('swing-high', 'swing-low', 'Swing')">
            <span class="level-label-lg">SWING H/L</span>
            <span class="level-value-lg"><span id="swing-high">—</span> / <span id="swing-low">—</span></span>
        </div>
        <div class="level-row" onclick="copyText('sl-value', null, 'SL')">
            <span class="level-label-lg">SL (50% TP)</span>
            <span class="level-value-lg text-red" id="sl-value">—</span>
        </div>
        <div class="level-row" onclick="copyText('entry-zone-low', 'entry-zone-high', 'Entry Zone')">
            <span class="level-label-lg">ENTRY ZONE</span>
            <span class="level-value-lg"><span class="text-gold" id="entry-zone-low">—</span> / <span class="text-gold" id="entry-zone-high">—</span></span>
        </div>
        <div class="level-row" onclick="copyText('tp-value', null, 'TP')">
            <span class="level-label-lg">TP (27% RANGE)</span>
            <span class="level-value-lg text-blue" id="tp-value">—</span>
        </div>
        <div class="level-row" onclick="copyText('range-value', null, 'Range')">
            <span class="level-label-lg">RANGE (points)</span>
            <span class="level-value-lg" id="range-value">—</span>
        </div>
    </div>
    
    <div class="divider-silver"></div>
    <div class="console-f12" id="console-f12"></div>
    <div class="divider-silver"></div>
    
    <footer class="footer-bar">
        <div class="footer-left">
            <div class="session-info">
                <div><span class="session-label">SESSION</span><span class="session-value" id="session-tag">NY</span></div>
                <div><span class="session-label">DATE</span><span class="session-value" id="date-display">—</span></div>
            </div>
            <div class="clock" id="clock-display">00:00:00</div>
        </div>
    </footer>
</div>

<script>
(function() {
    'use strict';
    
    // ==================== KONFIGURASI ====================
    const TP_RANGE_PCT = 0.27;
    const SL_TP_RATIO = 0.5;
    const CONSOLE_MAX_ENTRIES = 50;
    const CONSOLE_TTL_MS = 24 * 60 * 60 * 1000;
    
    // ==================== SWING POINTS ====================
    const TRADINGVIEW_SWINGS = {
        XAUUSDT: {
            '4h': { swingHigh: 4871.380, swingLow: 4644.465 },
            '1h': { swingHigh: 4891.540, swingLow: 4767.845 },
            '15m': { swingHigh: 4891.540, swingLow: 4853.790 },
            '5m': { swingHigh: 4873.535, swingLow: 4853.790 }
        },
        BTCUSDT: {
            '4h': { swingHigh: 76126.5, swingLow: 65698.0 },
            '1h': { swingHigh: 78545.0, swingLow: 73335.0 },
            '15m': { swingHigh: 78358.5, swingLow: 75127.5 },
            '5m': { swingHigh: 78358.5, swingLow: 77127.5 }
        }
    };
    
    const WEIGHTS = { adx: 25, ema: 20, rsi: 15, mtf: 20, zone: 20 };
    
    // ==================== CONSOLE MANAGER ====================
    class ConsoleManager {
        constructor() {
            this.logs = this.loadLogs();
            this.cleanExpired();
        }
        loadLogs() {
            try { const stored = localStorage.getItem('ura_console_logs'); return stored ? JSON.parse(stored) : []; }
            catch(e) { return []; }
        }
        saveLogs() { try { localStorage.setItem('ura_console_logs', JSON.stringify(this.logs)); } catch(e) {} }
        cleanExpired() {
            const now = Date.now();
            this.logs = this.logs.filter(log => (now - log.timestamp) < CONSOLE_TTL_MS);
            if (this.logs.length > CONSOLE_MAX_ENTRIES) this.logs = this.logs.slice(-CONSOLE_MAX_ENTRIES);
            this.saveLogs();
        }
        addLog(pair, tf, bias, price, range, tp, sl) {
            const prec = pair === "XAUUSDT" ? 2 : 1;
            const tpDist = Math.abs(tp - price);
            const slDist = Math.abs(sl - price);
            const rr = (tpDist / slDist).toFixed(2);
            const log = { timestamp: Date.now(), pair, tf, bias, price, range, tp, sl, tpDist, slDist, rr, prec };
            this.logs.push(log);
            this.cleanExpired();
            this.saveLogs();
            this.render();
            return log;
        }
        addEventLog(event) {
            const log = { timestamp: Date.now(), type: 'event', message: event };
            this.logs.push(log);
            this.cleanExpired();
            this.saveLogs();
            this.render();
        }
        formatLogLine(log) {
            if (log.type === 'event') return `<span class="console-output" style="color:var(--accent-gold);">> ${log.message}</span>`;
            const prec = log.prec || 2;
            const biasClass = log.bias === 'BEARISH' ? 'bearish' : '';
            return `<span class="console-output ${biasClass}">> ${log.pair} ${log.tf} | ${log.bias} | Price: ${log.price.toFixed(prec)} | Range: ${log.range.toFixed(prec)} | TP: ${log.tp.toFixed(prec)} (+${log.tpDist.toFixed(prec)}) | SL: ${log.sl.toFixed(prec)} (-${log.slDist.toFixed(prec)}) | R:R 1:${log.rr}</span>`;
        }
        render() {
            const container = document.getElementById('console-f12');
            if (!container) return;
            const recentLogs = this.logs.slice(-5);
            let html = '';
            recentLogs.forEach(log => {
                if (log.type === 'event') html += `<div class="console-line" onclick="copyConsoleLine(this)"><span class="console-prompt">$</span> <span class="console-cmd">ura --event</span> ${this.formatLogLine(log)}</div>`;
                else html += `<div class="console-line" onclick="copyConsoleLine(this)"><span class="console-prompt">$</span> <span class="console-cmd">ura --status</span> ${this.formatLogLine(log)}</div>`;
            });
            html += `<div class="console-line" onclick="copyConsoleLine(this)"><span class="console-prompt">$</span> <span class="console-cmd" style="opacity:0.5;">_</span></div>`;
            container.innerHTML = html;
        }
    }
    
    const consoleManager = new ConsoleManager();
    
    window.copyText = function(...args) {
        let text = '';
        if (args.length === 1 && typeof args[0] === 'string') {
            const el = document.getElementById(args[0]);
            if (el) text = el.textContent.trim();
        } else if (args.length >= 2) {
            const el1 = document.getElementById(args[0]);
            const el2 = args[1] ? document.getElementById(args[1]) : null;
            const label = args[2] || '';
            if (el1 && el2) text = `${label}: ${el1.textContent} / ${el2.textContent}`;
            else if (el1) text = el1.textContent.trim();
        }
        if (text) navigator.clipboard?.writeText(text).catch(() => {
            const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
    };
    
    window.copyConsoleLine = function(el) {
        const text = el.textContent.trim();
        navigator.clipboard?.writeText(text).catch(() => {
            const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
    };
    
    class CircularBuffer {
        constructor(maxSize) { this.maxSize = maxSize; this.data = []; this.start = 0; this.end = 0; this.length = 0; this.timestampMap = new Map(); }
        push(item) {
            if (this.timestampMap.has(item.t)) { this.data[this.timestampMap.get(item.t)] = item; return; }
            if (this.length < this.maxSize) { this.data.push(item); this.timestampMap.set(item.t, this.length); this.length++; this.end = this.length; }
            else { const old = this.data[this.start]; if (old) this.timestampMap.delete(old.t); this.data[this.start] = item; this.timestampMap.set(item.t, this.start); this.start = (this.start + 1) % this.maxSize; this.end = (this.end + 1) % this.maxSize; }
        }
        getLatest() { if (this.length === 0) return null; return this.data[(this.end - 1 + this.maxSize) % this.maxSize]; }
        toArray() { if (this.length === 0) return []; const r = []; for (let i = 0; i < this.length; i++) r.push(this.data[(this.start + i) % this.maxSize]); return r; }
        clear() { this.data = []; this.start = 0; this.end = 0; this.length = 0; this.timestampMap.clear(); }
    }
    
    const UI = {
        dot: document.getElementById('status-dot'), text: document.getElementById('status-text'),
        signalBar: document.getElementById('signal-bar'), priceMain: document.getElementById('live-price'),
        priceChange: document.getElementById('price-change'), decision: document.getElementById('decision-status'),
        arrow: document.getElementById('direction-arrow'), emaValue: document.getElementById('ema-value'),
        emaDistance: document.getElementById('ema-distance'), emaTrend: document.getElementById('ema-trend'),
        adxValue: document.getElementById('adx-value'), diValues: document.getElementById('di-values'),
        adxTrend: document.getElementById('adx-trend'), rsiValue: document.getElementById('rsi-bar-value'),
        rsiFill: document.getElementById('rsi-fill'), swingHigh: document.getElementById('swing-high'),
        swingLow: document.getElementById('swing-low'), entryZoneLow: document.getElementById('entry-zone-low'),
        entryZoneHigh: document.getElementById('entry-zone-high'), tpValue: document.getElementById('tp-value'),
        slValue: document.getElementById('sl-value'), rangeValue: document.getElementById('range-value'),
        clock: document.getElementById('clock-display'), date: document.getElementById('date-display'),
        session: document.getElementById('session-tag')
    };
    
    const PAIR_CONFIG = {
        XAUUSDT: { adxThreshold: 24, rsiOverbought: 75, rsiOversold: 25, atrPeriod: 14, entryZoneATRFactor: 0.3 },
        BTCUSDT: { adxThreshold: 22, rsiOverbought: 70, rsiOversold: 30, atrPeriod: 14, entryZoneATRFactor: 0.5 }
    };
    
    function getTradingViewSwingPoints() {
        const pairSwings = TRADINGVIEW_SWINGS[currentPair];

    }
    
    function calculateEMA(data, period) { 
        if (!data || data.length < period) return 0;
        const closes = data.slice(-period * 2).map(c => c.c);
        if (closes.length < period) return 0;
        let ema = closes.slice(0, period).reduce((a,b) => a+b,0) / period;
        const multiplier = 2/(period+1);
        for (let i=period; i<closes.length; i++) ema = (closes[i]-ema)*multiplier + ema;
        return ema;
    }
    
    function calculateATR(data, period=14) { 
        if (!data || data.length < period+1) return 0;
        let tr = [];
        for (let i=1; i<data.length; i++) {
            const h = data[i].h, l = data[i].l, pc = data[i-1].c;
            tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
        }
        if (tr.length < period) return 0;
        return tr.slice(-period).reduce((a,b)=>a+b,0)/period;
    }
    
    function calculateADX(data) {
        if (data.length < 28) return { adx: 15, plusDI: 0, minusDI: 0 };
        const period=14;
        let tr=[], plusDM=[], minusDM=[];
        for (let i=1; i<data.length; i++) {
            const h=data[i].h, l=data[i].l, ph=data[i-1].h, pl=data[i-1].l, pc=data[i-1].c;
            tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
            const upMove = h-ph, downMove = pl-l;
            if (upMove > downMove && upMove>0) { plusDM.push(upMove); minusDM.push(0); }
            else if (downMove > upMove && downMove>0) { plusDM.push(0); minusDM.push(downMove); }
            else { plusDM.push(0); minusDM.push(0); }
        }
        let atr = tr.slice(0,period).reduce((a,b)=>a+b,0);
        let pDM = plusDM.slice(0,period).reduce((a,b)=>a+b,0);
        let mDM = minusDM.slice(0,period).reduce((a,b)=>a+b,0);
        let dxValues=[], lastPDI=0, lastMDI=0;
        for (let i=period; i<tr.length; i++) {
            atr = (atr*(period-1)+tr[i])/period;
            pDM = (pDM*(period-1)+plusDM[i])/period;
            mDM = (mDM*(period-1)+minusDM[i])/period;
            lastPDI = atr>0 ? (pDM/atr)*100 : 0;
            lastMDI = atr>0 ? (mDM/atr)*100 : 0;
            const dx = (lastPDI+lastMDI)>0 ? (Math.abs(lastPDI-lastMDI)/(lastPDI+lastMDI))*100 : 0;
            dxValues.push(dx);
        }
        let adxValue = 15;
        if (dxValues.length>=period) {
            let smoothedADX = dxValues.slice(0,period).reduce((a,b)=>a+b,0)/period;
            for (let i=period; i<dxValues.length; i++) smoothedADX = (smoothedADX*(period-1)+dxValues[i])/period;
            adxValue = smoothedADX;
        }
        return { adx: Math.max(5, Math.min(100, adxValue)), plusDI: lastPDI, minusDI: lastMDI };
    }
    
    function computeRSI(data) {
        if (data.length<15) return 50;
        const closes = data.map(c=>c.c);
        let gains=[], losses=[];
        for (let i=1; i<closes.length; i++) {
            const diff = closes[i]-closes[i-1];
            gains.push(diff>0?diff:0); losses.push(diff<0?-diff:0);
        }
        let avgG = gains.slice(0,14).reduce((a,b)=>a+b,0)/14;
        let avgL = losses.slice(0,14).reduce((a,b)=>a+b,0)/14;
        for (let i=14; i<gains.length; i++) {
            avgG = (avgG*13+gains[i])/14;
            avgL = (avgL*13+losses[i])/14;
        }
        return avgL===0?100:100-(100/(1+avgG/avgL));
    }
    
    function calculateWeightedScore(adx, ema21, lastPrice, rsi, mtfBullishCount, inZone, config) {
        let weightedSum = 0, totalWeight = 0;

        let emaScore = (lastPrice > ema21) ? 100 : 0;
        weightedSum += emaScore * WEIGHTS.ema; totalWeight += WEIGHTS.ema;
        let rsiScore = rsi > 70 ? 80 : rsi > 60 ? 70 : rsi > 55 ? 60 : rsi > 50 ? 50 : rsi > 45 ? 40 : rsi > 40 ? 30 : rsi > 30 ? 20 : 10;
        weightedSum += rsiScore * WEIGHTS.rsi; totalWeight += WEIGHTS.rsi;
        let mtfScore = (mtfBullishCount / 4) * 100;
        weightedSum += mtfScore * WEIGHTS.mtf; totalWeight += WEIGHTS.mtf;
        let zoneScore = inZone ? 100 : 0;

    }

        consoleManager.addEventLog(`Switched to ${currentPair} ${currentTF}`);
        await fetchKlines(); if (currentRequestId !== requestId) { isReloading = false; return; }
        await updateMTFBias(); if (currentRequestId !== requestId) { isReloading = false; return; }
        initWebSocket();
        heartbeatInterval = setInterval(() => { if (wsConnection?.readyState===WebSocket.OPEN) try { wsConnection.send(JSON.stringify({method:"ping"})); } catch(e) {} }, 30000);
        stuckCheckInterval = setInterval(() => {
            const now=Date.now(), timeSinceLastPrice = now-lastPriceUpdateTime;
            if (timeSinceLastPrice>10000 && lastPrice>0 && !isDataStale) updateWSStatus('stale');
            else if (isDataStale && timeSinceLastPrice<5000) updateWSStatus(isUsingFallback?'fallback':'live');
            const timeSinceLastMsg = now-lastWSMessageTime;
            if (wsConnection?.readyState===WebSocket.OPEN && timeSinceLastMsg>10000 && !isUsingFallback && !isReloading) { updateWSStatus('fallback'); isUsingFallback=true; fetchPriceREST(); }
            if (wsConnection?.readyState!==WebSocket.OPEN && !isReloading && !isManualDisconnect) updateWSStatus('reconnect');
        }, 5000);
        restFallbackInterval = setInterval(fetchPriceREST, 5000);
        mtfUpdateInterval = setInterval(() => { updateMTFBias(); }, currentTF === '5m' ? 30000 : 120000);
        isReloading = false;
        if (reloadQueue) setTimeout(() => fullReload(), 100);
    }
    
    document.querySelectorAll('[data-pair]').forEach(btn => btn.onclick = () => { if(!isReloading){ currentPair=btn.getAttribute('data-pair'); localStorage.setItem('lastPair',currentPair); fullReload(); } });
    document.querySelectorAll('.tf-btn').forEach(btn => btn.onclick = () => { if(!isReloading){ currentTF=btn.getAttribute('data-tf'); localStorage.setItem('lastTF',currentTF); fullReload(); } });
    
    setInterval(() => { const now=new Date(); UI.clock.textContent=now.toLocaleTimeString('id-ID'); UI.date.textContent=`${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`; UI.session.textContent = now.getHours()>=7 && now.getHours()<14 ? 'ASIA' : (now.getHours()>=14 && now.getHours()<20 ? 'LONDON' : 'NY'); }, 1000);
    
    consoleManager.render();
    fullReload();
})();
</script>
</body>
</html>
