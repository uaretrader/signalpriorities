<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>URA v2.1 – UR ADVISOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg-primary: #0F0F0F;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --border-subtle: #333333;
            --text-primary: #F5F5F5;
            --text-secondary: #A3A3A3;
            --text-tertiary: #737373;
            --accent-green: #10B981;
            --accent-red: #EF4444;
            --accent-blue: #3B82F6;
            --accent-purple: #8B5CF6;
            --accent-gold: #F59E0B;
            --accent-cyan: #06B6D4;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --silver-line: #404040;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            position: fixed; 
            top: 0; 
            left: 0; 
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            padding: 10px 14px;
            gap: 6px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }
        
        .logo-section { display: flex; align-items: baseline; gap: 8px; }
        .logo { font-weight: 700; font-size: 0.9rem; letter-spacing: -0.3px; color: var(--text-primary); }
        .logo-accent { color: var(--accent-cyan); font-weight: 800; }
        .version-tag { 
            font-size: 0.5rem; 
            font-weight: 700; 
            color: var(--accent-gold); 
            background: rgba(245, 158, 11, 0.15); 
            padding: 2px 6px; 
            border-radius: 100px; 
            border: 1px solid rgba(245, 158, 11, 0.3); 
        }
        .connection-badge { display: flex; align-items: center; gap: 6px; font-size: 0.6rem; font-weight: 600; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); transition: all 0.2s ease; }
        .status-dot.live { background: var(--success); box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); animation: pulse 2s infinite; }
        .status-dot.connecting { background: var(--warning); animation: pulse 1.5s infinite; }
        .status-dot.reconnect { background: var(--accent-gold); animation: pulse 1s infinite; }
        .status-dot.fallback { background: var(--accent-blue); animation: pulse 1.5s infinite; }
        .status-dot.stale { background: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .nav-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 6px; }
        .tab-group { display: flex; gap: 2px; background: var(--bg-secondary); padding: 2px; border-radius: 4px; border: 1px solid var(--border-subtle); }
        .tab-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-tertiary); 
            padding: 5px 10px; 
            font-size: 0.55rem; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 4px; 
            transition: all 0.15s; 
            white-space: nowrap; 
            display: inline-flex; 
            align-items: center; 
            gap: 3px; 
        }
        .tab-btn.active { color: var(--text-primary); background: var(--bg-tertiary); }
        .tf-bias-symbol { font-weight: 700; font-size: 0.75rem; }
        .tf-bias-symbol.bullish { color: var(--accent-green); }
        .tf-bias-symbol.bearish { color: var(--accent-red); }
        .tf-bias-symbol.neutral { color: var(--text-tertiary); }
        
        .mode-row { display: flex; gap: 6px; flex-shrink: 0; }
        .mode-btn { 
            flex: 1;
            background: var(--bg-secondary); 
            border: 1px solid var(--border-subtle); 
            color: var(--text-tertiary); 
            padding: 6px 8px; 
            font-size: 0.55rem; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 4px; 
            transition: all 0.2s; 
            text-align: center;
            letter-spacing: 0.3px; 
        }
        .mode-btn.active { 
            background: var(--bg-tertiary); 
            border-color: var(--accent-cyan); 
            color: var(--accent-cyan); 
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.2); 
        }
        
        .signal-bar { 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-subtle); 
            border-radius: 6px; 
            padding: 10px 14px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            flex-shrink: 0; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .signal-content { display: flex; align-items: baseline; gap: 10px; }
        .signal-badge { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: var(--accent-gold); letter-spacing: 0.5px; }
        .signal-text { font-size: 0.85rem; font-weight: 700; letter-spacing: -0.3px; }
        .signal-arrow { font-size: 1.3rem; font-weight: 300; line-height: 1; }
        
        .price-section { display: flex; align-items: baseline; justify-content: space-between; padding: 2px 0; flex-shrink: 0; }
        .price-main { font-size: 2.2rem; font-weight: 700; letter-spacing: -1.5px; line-height: 1; color: var(--text-primary); }
        .price-decimal { font-size: 1.4rem; opacity: 0.5; font-weight: 500; }
        .price-change { 
            font-size: 0.65rem; 
            font-weight: 600; 
            padding: 3px 8px; 
            border-radius: 100px; 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-subtle);
        }
        
        .metrics-duo { display: flex; gap: 6px; flex-shrink: 0; }
        .metric-card { 
            flex: 1; 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-subtle); 
            border-radius: 6px; 
            padding: 8px 10px; 
        }
        .metric-header { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .metric-label { font-size: 0.5rem; font-weight: 700; text-transform: uppercase; color: var(--text-tertiary); letter-spacing: 0.3px; }
        .metric-value { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; color: var(--text-primary); }
        .metric-sub { font-size: 0.5rem; color: var(--text-secondary); }
        .adx-warning { color: var(--warning) !important; }
        
        .rsi-bar-container { 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-subtle); 
            border-radius: 6px; 
            padding: 8px 10px; 
            flex-shrink: 0; 
            cursor: pointer; 
        }
        .rsi-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .rsi-bar-title { font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); }
        .rsi-bar-value { font-size: 0.7rem; font-weight: 700; color: var(--text-primary); }
        .rsi-track { height: 3px; background: var(--bg-tertiary); border-radius: 100px; overflow: hidden; margin: 5px 0; }
        .rsi-fill { height: 100%; width: 50%; border-radius: 100px; transition: width 0.2s ease; }
        .rsi-fill.oversold { background: var(--accent-green); }
        .rsi-fill.neutral { background: var(--text-tertiary); }
        .rsi-fill.overbought { background: var(--accent-red); }
        .rsi-labels { display: flex; justify-content: space-between; font-size: 0.4rem; color: var(--text-tertiary); font-weight: 600; }
        
        .levels-grid-vertical { 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-subtle); 
            border-radius: 6px; 
            padding: 6px 10px; 
            flex-shrink: 0; 
            gap: 4px; 
        }
        .level-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline; 
            cursor: pointer; 
            padding: 3px 0; 
            border-bottom: 1px solid var(--border-subtle);
            user-select: none;
        }
        .level-row:last-child { border-bottom: none; }
        .level-label-lg { font-size: 0.65rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
        .level-value-lg { font-size: 0.65rem; font-weight: 700; color: var(--text-primary); text-align: right; font-family: 'Inter', monospace; }
        
        .divider-silver { height: 1px; background: var(--silver-line); margin: 2px 0; flex-shrink: 0; }
        
        .console-f12 {
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 0.45rem;
            color: var(--text-tertiary);
            padding: 2px 0;
            line-height: 1.4;
            flex-shrink: 0;
            max-height: 70px;
            overflow-y: auto;
            user-select: text;
        }
        .console-line { 
            display: flex; 
            gap: 5px; 
            cursor: pointer;
            padding: 1px 0;
        }
        .console-prompt { color: var(--accent-cyan); flex-shrink: 0; font-weight: 700; }
        .console-cmd { color: var(--text-tertiary); flex-shrink: 0; }
        .console-output { color: var(--accent-green); word-break: break-all; }
        .console-output.bearish { color: var(--accent-red); }
        .console-output.neutral { color: var(--warning); }
        
        .footer-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-top: 4px; 
            flex-shrink: 0; 
            gap: 6px; 
        }
        .footer-left { display: flex; align-items: center; gap: 10px; }
        .session-info { display: flex; gap: 8px; font-size: 0.5rem; }
        .session-label { color: var(--text-tertiary); margin-right: 3px; }
        .session-value { font-weight: 700; color: var(--text-secondary); }
        .clock { font-size: 0.6rem; font-weight: 700; color: var(--text-tertiary); }
        
        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }
        .text-gold { color: var(--accent-gold); }
        .text-blue { color: var(--accent-blue); }
        .text-cyan { color: var(--accent-cyan); }
        
        ::-webkit-scrollbar { width: 2px; height: 2px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <span class="logo">URA · UR ADVISOR</span>
            <span class="version-tag">v2.1</span>
        </div>
        <div class="connection-badge">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">INIT</span>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="tab-group">
            <button class="tab-btn active" data-pair="XAUUSDT">XAUUSD</button>
            <button class="tab-btn" data-pair="BTCUSDT">BTCUSD</button>
        </div>
        <div class="tab-group" id="tf-group">
            <button class="tab-btn tf-btn" data-tf="4h"><span class="tf-label">H4</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn" data-tf="1h"><span class="tf-label">H1</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn active" data-tf="15m"><span class="tf-label">M15</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn" data-tf="5m"><span class="tf-label">M5</span><span class="tf-bias-symbol"></span></button>
        </div>
    </nav>

    <div class="mode-row">
        <button class="mode-btn" data-mode="conservative">🛡️ CONSERVATIVE</button>
        <button class="mode-btn" data-mode="sniper">🎯 SNIPER</button>
    </div>

    <div class="signal-bar" id="signal-bar" onclick="copyText('decision-status')">
        <div class="signal-content">
            <span class="signal-badge">SIGNAL</span>
            <span class="signal-text" id="decision-status">CALIBRATING</span>
        </div>
        <div class="signal-arrow" id="direction-arrow">—</div>
    </div>

    <div class="price-section">
        <div class="price-main" id="live-price">0.00</div>
        <div class="price-change" id="price-change"></div>
    </div>

    <div class="metrics-duo">
        <div class="metric-card">
            <div class="metric-header"><span class="metric-label">EMA 21</span><span id="ema-trend">—</span></div>
            <div class="metric-value" id="ema-value">—</div>
            <div class="metric-sub" id="ema-distance">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-header"><span class="metric-label">ADX / DI</span><span id="adx-trend">—</span></div>
            <div class="metric-value" id="adx-value">—</div>
            <div class="metric-sub" id="di-values">—</div>
        </div>
    </div>

    <div class="rsi-bar-container" id="rsi-bar-container" onclick="copyText('rsi-bar-value')">
        <div class="rsi-bar-header">
            <span class="rsi-bar-title">RSI (14)</span>
            <span class="rsi-bar-value" id="rsi-bar-value">—</span>
        </div>
        <div class="rsi-track"><div class="rsi-fill" id="rsi-fill"></div></div>
        <div class="rsi-labels"><span>OVERSOLD</span><span>50</span><span>OVERBOUGHT</span></div>
    </div>

    <div class="levels-grid-vertical" id="levels-grid">
        <div class="level-row" onclick="copyText('swing-high', 'swing-low', 'Swing')">
            <span class="level-label-lg">SWING HIGH/LOW</span>
            <span class="level-value-lg"><span id="swing-high">—</span> / <span id="swing-low">—</span></span>
        </div>
        <div class="level-row" onclick="copyText('sl-value', null, 'SL')">
            <span class="level-label-lg">STOP LOSS</span>
            <span class="level-value-lg text-red" id="sl-value">—</span>
        </div>
        <div class="level-row" onclick="copyText('entry-zone-low', 'entry-zone-high', 'Entry Zone')">
            <span class="level-label-lg">ENTRY ZONE</span>
            <span class="level-value-lg"><span class="text-gold" id="entry-zone-low">—</span> / <span class="text-gold" id="entry-zone-high">—</span></span>
        </div>
        <div class="level-row" onclick="copyText('tp-value', null, 'TP')">
            <span class="level-label-lg">TAKE PROFIT</span>
            <span class="level-value-lg text-blue" id="tp-value">—</span>
        </div>
        <div class="level-row" onclick="copyText('range-value', null, 'Range')">
            <span class="level-label-lg">RANGE (PTS)</span>
            <span class="level-value-lg" id="range-value">—</span>
        </div>
    </div>
    
    <div class="divider-silver"></div>
    <div class="console-f12" id="console-f12"></div>
    <div class="divider-silver"></div>
    
    <footer class="footer-bar">
        <div class="footer-left">
            <div class="session-info">
                <div><span class="session-label">SESSION</span><span class="session-value" id="session-tag">NY</span></div>
                <div><span class="session-label">DATE</span><span class="session-value" id="date-display">—</span></div>
            </div>
            <div class="clock" id="clock-display">00:00:00</div>
        </div>
    </footer>
</div>

<script>
(function() {
    'use strict';
    
    // ==================== KONFIGURASI v2.1 ASLI (TIDAK DIUBAH) ====================
    const TP_RANGE_PCT = 0.27;
    const SL_TP_RATIO_CONSERVATIVE = 1.2;
    const SL_TP_RATIO_SNIPER = 0.9;
    const ENTRY_ZONE_FACTOR_CONSERVATIVE = 0.25;
    const ENTRY_ZONE_FACTOR_SNIPER = 0.15;
    const MIN_ADX_TREND = 22;
    const STRONG_ADX_THRESHOLD = 35;
    const CONSOLE_MAX_ENTRIES = 50;
    const CONSOLE_TTL_MS = 24 * 60 * 60 * 1000;
    
    // ==================== THRESHOLD SINYAL PER MODE (TIDAK DIUBAH) ====================
    const THRESHOLDS = {
        conservative: { strong: 80, zone: 65, wait: 70, weakAdx: 22 },
        sniper: { strong: 70, zone: 55, wait: 60, weakAdx: 20 }
    };
    
    let currentMode = localStorage.getItem('ura_mode') || 'conservative';
    
    // ==================== PURE FRACTAL + 30 CANDLE (HANYA INI YANG DIUBAH) ====================
    const FRACTAL_LOOKBACK = 2; // Pure Bill Williams
    const DATA_SLICE_CANDLES = 30; // Responsif struktur terbaru
    
    function detectFractalSwingPoints(data) {
        const lookback = FRACTAL_LOOKBACK;
        
        if (!data || data.length < lookback * 2 + 1) {
            if (data && data.length > 0) {
                const highs = data.map(c => c.h);
                const lows = data.map(c => c.l);
                return { swingHigh: Math.max(...highs), swingLow: Math.min(...lows) };
            }
            return { swingHigh: 0, swingLow: 0 };
        }
        
        let swingHigh = -Infinity, swingLow = Infinity;
        let foundHigh = false, foundLow = false;
        
        for (let i = lookback; i < data.length - lookback; i++) {
            const currHigh = data[i].h, currLow = data[i].l;
            let isSwingHigh = true, isSwingLow = true;
            
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i) {
                    if (data[j].h >= currHigh) isSwingHigh = false;
                    if (data[j].l <= currLow) isSwingLow = false;
                }
            }
            
            if (isSwingHigh) { if (currHigh > swingHigh) swingHigh = currHigh; foundHigh = true; }
            if (isSwingLow) { if (currLow < swingLow) swingLow = currLow; foundLow = true; }
        }
        
        const allHighs = data.map(c => c.h);
        const allLows = data.map(c => c.l);
        
        if (!foundHigh || swingHigh === -Infinity) swingHigh = Math.max(...allHighs);
        if (!foundLow || swingLow === Infinity) swingLow = Math.min(...allLows);
        if (swingHigh <= swingLow) { swingHigh = Math.max(...allHighs); swingLow = Math.min(...allLows); }
        
        return { swingHigh, swingLow };
    }
    
    function detectValidSwingPoints() {
        const candleArray = getCandleArray();
        if (candleArray.length < 20) {
            return { 
                swingHigh: Math.max(...candleArray.map(c => c.h)), 
                swingLow: Math.min(...candleArray.map(c => c.l)), 
                range: Math.max(...candleArray.map(c => c.h)) - Math.min(...candleArray.map(c => c.l))
            };
        }
        
        // v2.1 FINAL: Hanya 30 candle terakhir
        const dataSlice = candleArray.slice(-Math.min(candleArray.length, DATA_SLICE_CANDLES));
        
        let { swingHigh, swingLow } = detectFractalSwingPoints(dataSlice);
        let range = swingHigh - swingLow;
        
        if (range <= 0 || isNaN(range) || !isFinite(range)) {
            swingHigh = Math.max(...dataSlice.map(c => c.h));
            swingLow = Math.min(...dataSlice.map(c => c.l));
            range = swingHigh - swingLow;
        }
        
        return { swingHigh, swingLow, range };
    }
    
    // ==================== CONSOLE MANAGER (TIDAK DIUBAH) ====================
    class ConsoleManager {
        constructor() { this.logs = this.loadLogs(); this.cleanExpired(); }
        loadLogs() { try { const stored = localStorage.getItem('ura_console_logs_v2'); return stored ? JSON.parse(stored) : []; } catch(e) { return []; } }
        saveLogs() { try { localStorage.setItem('ura_console_logs_v2', JSON.stringify(this.logs)); } catch(e) {} }
        cleanExpired() { const now = Date.now(); this.logs = this.logs.filter(log => (now - log.timestamp) < CONSOLE_TTL_MS); if (this.logs.length > CONSOLE_MAX_ENTRIES) this.logs = this.logs.slice(-CONSOLE_MAX_ENTRIES); this.saveLogs(); }
        addLog(pair, tf, bias, price, range, tp, sl, score, mode) { 
            const prec = pair === "XAUUSDT" ? 2 : 1; 
            const tpDist = Math.abs(tp - price); 
            const slDist = Math.abs(sl - price); 
            const rr = tpDist > 0 && slDist > 0 ? (tpDist / slDist).toFixed(2) : 'N/A';
            const log = { timestamp: Date.now(), pair, tf, bias, price, range, tp, sl, tpDist, slDist, rr, prec, score, mode }; 
            this.logs.push(log); 
            this.cleanExpired(); 
            this.saveLogs(); 
            this.render(); 
            return log; 
        }
        addEventLog(event) { const log = { timestamp: Date.now(), type: 'event', message: event }; this.logs.push(log); this.cleanExpired(); this.saveLogs(); this.render(); }
        formatLogLine(log) { 
            if (log.type === 'event') return `<span class="console-output" style="color:var(--accent-gold);">> ${log.message}</span>`; 
            const prec = log.prec || 2; 
            const biasClass = log.bias === 'BEARISH' ? 'bearish' : (log.bias === 'NEUTRAL' ? 'neutral' : '');
            const scoreInfo = log.score ? ` | Score: ${Math.round(log.score)}%` : '';
            const modeInfo = log.mode ? ` | ${log.mode}` : '';
            return `<span class="console-output ${biasClass}">> ${log.pair} ${log.tf} | ${log.bias} | P: ${log.price.toFixed(prec)} | R: ${log.range.toFixed(prec)} | TP: ${log.tp.toFixed(prec)} | SL: ${log.sl.toFixed(prec)} | R:R ${log.rr}${scoreInfo}${modeInfo}</span>`; 
        }
        render() { 
            const container = document.getElementById('console-f12'); 
            if (!container) return; 
            const recentLogs = this.logs.slice(-5); 
            let html = ''; 
            recentLogs.forEach(log => { 
                if (log.type === 'event') html += `<div class="console-line" onclick="copyConsoleLine(this)"><span class="console-prompt">></span> <span class="console-cmd">ura --event</span> ${this.formatLogLine(log)}</div>`; 
                else html += `<div class="console-line" onclick="copyConsoleLine(this)"><span class="console-prompt">></span> <span class="console-cmd">ura --signal</span> ${this.formatLogLine(log)}</div>`; 
            }); 
            html += `<div class="console-line" onclick="copyConsoleLine(this)"><span class="console-prompt">></span> <span class="console-cmd" style="opacity:0.4;">_ pure fractal 30c ready</span></div>`; 
            container.innerHTML = html; 
        }
    }
    
    const consoleManager = new ConsoleManager();
    
    // ==================== SMART COPY (TIDAK DIUBAH) ====================
    window.copyText = function(...args) { 
        let text = ''; 
        if (args.length === 1 && typeof args[0] === 'string') { 
            const el = document.getElementById(args[0]); 
            if (el) text = el.textContent.trim(); 
        } else if (args.length >= 2 && typeof args[0] === 'string') { 
            const el1 = document.getElementById(args[0]);

    class CircularBuffer {
        constructor(maxSize) { this.maxSize = maxSize; this.data = []; this.start = 0; this.end = 0; this.length = 0; this.timestampMap = new Map(); }
        push(item) { if (this.timestampMap.has(item.t)) { this.data[this.timestampMap.get(item.t)] = item; return; } if (this.length < this.maxSize) { this.data.push(item); this.timestampMap.set(item.t, this.length); this.length++; this.end = this.length; } else { const old = this.data[this.start]; if (old) this.timestampMap.delete(old.t); this.data[this.start] = item; this.timestampMap.set(item.t, this.start); this.start = (this.start + 1) % this.maxSize; this.end = (this.end + 1) % this.maxSize; } }
        getLatest() { if (this.length === 0) return null; return this.data[(this.end - 1 + this.maxSize) % this.maxSize]; }
        toArray() { if (this.length === 0) return []; const r = []; for (let i = 0; i < this.length; i++) r.push(this.data[(this.start + i) % this.maxSize]); return r; }
        clear() { this.data = []; this.start = 0; this.end = 0; this.length = 0; this.timestampMap.clear(); }
    }

    function calculateEMA(data, period) { if (!data || data.length < period) return 0; const closes = data.slice(-period * 2).map(c => c.c); if (closes.length < period) return 0; let ema = closes.slice(0, period).reduce((a,b) => a+b,0) / period; const multiplier = 2/(period+1); for (let i=period; i<closes.length; i++) ema = (closes[i]-ema)*multiplier + ema; return ema; }
    function calculateATR(data, period=14) { if (!data || data.length < period+1) return 0; let tr = []; for (let i=1; i<data.length; i++) { const h = data[i].h, l = data[i].l, pc = data[i-1].c; tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc))); } if (tr.length < period) return 0; return tr.slice(-period).reduce((a,b)=>a+b,0)/period; }
    function calculateADX(data) { 
        if (data.length < 28) return { adx: 15, plusDI: 0, minusDI: 0 }; 
        const period=14; let tr=[], plusDM=[], minusDM=[]; 
        for (let i=1; i<data.length; i++) { 
            const h=data[i].h, l=data[i].l, ph=data[i-1].h, pl=data[i-1].l, pc=data[i-1].c; 
            tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc))); 
            const upMove = h-ph, downMove = pl-l; 
            if (upMove > downMove && upMove>0) { plusDM.push(upMove); minusDM.push(0); } 
            else if (downMove > upMove && downMove>0) { plusDM.push(0); minusDM.push(downMove); } 
            else { plusDM.push(0); minusDM.push(0); } 
        } 
        let atr = tr.slice(0,period).reduce((a,b)=>a+b,0); 
        let pDM = plusDM.slice(0,period).reduce((a,b)=>a+b,0); 
        let mDM = minusDM.slice(0,period).reduce((a,b)=>a+b,0); 
        let dxValues=[], lastPDI=0, lastMDI=0; 
        for (let i=period; i<tr.length; i++) { 
            atr = (atr*(period-1)+tr[i])/period; 
            pDM = (pDM*(period-1)+plusDM[i])/period; 
            mDM = (mDM*(period-1)+minusDM[i])/period; 
            lastPDI = atr>0 ? (pDM/atr)*100 : 0; 
            lastMDI = atr>0 ? (mDM/atr)*100 : 0; 
            const dx = (lastPDI+lastMDI)>0 ? (Math.abs(lastPDI-lastMDI)/(lastPDI+lastMDI))*100 : 0; 
            dxValues.push(dx); 
        } 
        let adxValue = 15; 
        if (dxValues.length>=period) { 
            let smoothedADX = dxValues.slice(0,period).reduce((a,b)=>a+b,0)/period; 
            for (let i=period; i<dxValues.length; i++) smoothedADX = (smoothedADX*(period-1)+dxValues[i])/period; 
            adxValue = smoothedADX; 
        } 
        return { adx: Math.max(5, Math.min(100, adxValue)), plusDI: lastPDI, minusDI: lastMDI }; 
    }
    function computeRSI(data) { if (data.length<15) return 50; const closes = data.map(c=>c.c); let gains=[], losses=[]; for (let i=1; i<closes.length; i++) { const diff = closes[i]-closes[i-1]; gains.push(diff>0?diff:0); losses.push(diff<0?-diff:0); } let avgG = gains.slice(0,14).reduce((a,b)=>a+b,0)/14; let avgL = losses.slice(0,14).reduce((a,b)=>a+b,0)/14; for (let i=14; i<gains.length; i++) { avgG = (avgG*13+gains[i])/14; avgL = (avgL*13+losses[i])/14; } return avgL===0?100:100-(100/(1+avgG/avgL)); }
    
    const WEIGHTS = { adx: 30, ema: 15, rsi: 15, mtf: 20, zone: 20 };
    
    function calculateWeightedScore(adx, ema21, lastPrice, rsi, mtfBullishCount, mtfBearishCount, inZone, config, direction) {
        let weightedSum = 0, totalWeight = 0;
        let adxScore = 0;
        if (adx >= STRONG_ADX_THRESHOLD) adxScore = 100;
        else if (adx >= config.adxThreshold) adxScore = 75;
        else if (adx >= 18) adxScore = 40;
        else adxScore = 10;
        weightedSum += adxScore * WEIGHTS.adx; totalWeight += WEIGHTS.adx;
        
        let emaScore = 0;
        if (direction === "BULLISH" && lastPrice > ema21) emaScore = 100;
        else if (direction === "BEARISH" && lastPrice < ema21) emaScore = 100;
        else if (direction === "BULLISH" && lastPrice <= ema21) emaScore = 20;
        else if (direction === "BEARISH" && lastPrice >= ema21) emaScore = 20;
        weightedSum += emaScore * WEIGHTS.ema; totalWeight += WEIGHTS.ema;
        
        let rsiScore = 50;
        if (direction === "BULLISH") {
            if (rsi < 30) rsiScore = 90;
            else if (rsi >= 30 && rsi < 50) rsiScore = 80;
            else if (rsi >= 50 && rsi < 60) rsiScore = 70;
            else if (rsi >= 60 && rsi < 70) rsiScore = 50;
            else if (rsi >= 70) rsiScore = 20;
        } else {
            if (rsi > 70) rsiScore = 90;
            else if (rsi > 50 && rsi <= 70) rsiScore = 80;
            else if (rsi > 40 && rsi <= 50) rsiScore = 70;
            else if (rsi > 30 && rsi <= 40) rsiScore = 50;
            else if (rsi <= 30) rsiScore = 20;
        }
        weightedSum += rsiScore * WEIGHTS.rsi; totalWeight += WEIGHTS.rsi;
        
        let mtfScore = 0;
        if (direction === "BULLISH") mtfScore = (mtfBullishCount / 4) * 100;
        else mtfScore = (mtfBearishCount / 4) * 100;
        weightedSum += mtfScore * WEIGHTS.mtf; totalWeight += WEIGHTS.mtf;
        
        let zoneScore = inZone ? 100 : 0;
        weightedSum += zoneScore * WEIGHTS.zone; totalWeight += WEIGHTS.zone;
        
        return totalWeight === 0 ? 50 : weightedSum / totalWeight;
    }

    function getTimeframeBiasEnhanced(data) {
        if (!data || data.length < 30) return "NEUTRAL";
        const closes = data.map(c => c.c);
        const highs = data.map(c => c.h);
        const lows = data.map(c => c.l);
        const price = closes[closes.length - 1];
        const sma20 = closes.slice(-20).reduce((a,b) => a+b, 0) / 20;
        const sma50 = closes.length >= 50 ? closes.slice(-50).reduce((a,b) => a+b, 0) / 50 : sma20;
        const recentHighs = highs.slice(-10);
        const recentLows = lows.slice(-10);
        const maxHigh = Math.max(...recentHighs);
        const minLow = Math.min(...recentLows);
        if (price > sma20 && price > sma50 && price > (maxHigh * 0.998)) return "BULLISH";
        if (price < sma20 && price < sma50 && price < (minLow * 1.002)) return "BEARISH";
        if (price > sma20) return "BULLISH";
        if (price < sma20) return "BEARISH";
        return "NEUTRAL";
    }

            const change = p-prevPrice, pct = (change/prevPrice)*100;
            UI.priceChange.innerHTML = `${change>0?'+':''}${change.toFixed(prec)} (${pct.toFixed(2)}%)`;
            UI.priceChange.style.color = change>0?'var(--accent-green)':'var(--accent-red)';
        }
        lastPrice = p; prevPrice = p;
        updateDecision();
    }
    
    function safeValue(val, fallback=0) { return (typeof val==='number' && !isNaN(val) && isFinite(val)) ? val : fallback; }
    
    function updateWSStatus(status, message) {
        if (!UI.dot || !UI.text) return;
        UI.dot.className = 'status-dot';
        if (status==='live') { UI.dot.classList.add('live'); UI.text.innerText=message||'LIVE'; reconnectDelay=1000; isUsingFallback=false; isDataStale=false; }
        else if (status==='connecting') { UI.dot.classList.add('connecting'); UI.text.innerText=message||'CONNECTING'; }
        else if (status==='reconnect') { UI.dot.classList.add('reconnect'); UI.text.innerText=message||'RECONNECT'; }
        else if (status==='fallback') { UI.dot.classList.add('fallback'); UI.text.innerText=message||'FALLBACK'; isUsingFallback=true; }
        else if (status==='stale') { UI.dot.classList.add('stale'); UI.text.innerText=message||'DATA STALE'; isDataStale=true; }
    }
    
    function cleanupWebSocket() {
        if (wsConnection) { isManualDisconnect=true; try { wsConnection.onopen=wsConnection.onmessage=wsConnection.onclose=wsConnection.onerror=null; if (wsConnection.readyState===WebSocket.OPEN || wsConnection.readyState===WebSocket.CONNECTING) wsConnection.close(); } catch(e) {} wsConnection=null; }
        setTimeout(()=>{ isManualDisconnect=false; },100);
    }
    
    async function fetchKlines() {
        try {
            const resp = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${currentTF}&limit=150`);
            const data = await resp.json();
            if (Array.isArray(data)) {
                candleBuffer.clear();
                data.forEach(d => { candleBuffer.push({ t:d[0], o:parseFloat(d[1]), h:parseFloat(d[2]), l:parseFloat(d[3]), c:parseFloat(d[4]), v:parseFloat(d[5]) }); });
                invalidateCandleCache();
                if (candleBuffer.length > 0) { const latest = candleBuffer.getLatest(); lastPrice = prevPrice = latest.c; updateUI(lastPrice); }
                return true;
            }
        } catch(e) {}
        return false;
    }
    
    async function fetchPriceREST() {
        try {
            const resp = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${currentPair}`);
            const data = await resp.json();
            if (data?.price) { const price = parseFloat(data.price); if (price>0 && (Date.now()-lastWSMessageTime>3000 || isUsingFallback)) { lastPriceUpdateTime = Date.now(); throttledUIUpdate(price, true); } }
        } catch(e) {}
    }
    
    function initWebSocket() {
        cleanupWebSocket(); updateWSStatus('connecting','CONNECTING');
        const streamName = `${currentPair.toLowerCase()}@kline_${currentTF}`;
        try {
            wsConnection = new WebSocket(`wss://fstream.binance.com/ws/${streamName}`);
            wsConnection.onopen = () => { reconnectDelay=1000; lastWSMessageTime=lastPriceUpdateTime=Date.now(); isUsingFallback=false; isDataStale=false; updateWSStatus('live', `LIVE ${currentTF}`); };
            wsConnection.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg?.k) {
                        const k = msg.k, price = parseFloat(k.c), high = parseFloat(k.h), low = parseFloat(k.l), open = parseFloat(k.o), isClosed = k.x, candleTime = k.t;
                        if (price > 0) {
                            lastWSMessageTime = lastPriceUpdateTime = Date.now();
                            if (isUsingFallback) updateWSStatus('live', `LIVE ${currentTF}`);
                            if (isDataStale) updateWSStatus('live', `LIVE ${currentTF}`);
                            const candleArray = getCandleArray();
                            if (candleArray.length > 0) {
                                const lastCandle = candleArray[candleArray.length - 1];
                                if (isClosed && lastCandle.t !== candleTime) { candleBuffer.push({ t: candleTime, o: open, h: high, l: low, c: price, v: parseFloat(k.v) }); invalidateCandleCache(); }
                                else if (!isClosed && lastCandle.t === candleTime) { lastCandle.c = price; lastCandle.h = Math.max(lastCandle.h, high); lastCandle.l = Math.min(lastCandle.l, low); invalidateCandleCache(); }
                            }
                            throttledUIUpdate(price);
                        }
                    }
                } catch(err) {}
            };
            wsConnection.onclose = () => { if (!isReloading && !isManualDisconnect) { updateWSStatus('reconnect','RECONNECT'); if (reconnectTimer) clearTimeout(reconnectTimer); reconnectTimer = setTimeout(() => { if (!isReloading && !isManualDisconnect) { reconnectDelay = Math.min(reconnectDelay*1.5, 30000); initWebSocket(); } }, reconnectDelay); } };
            wsConnection.onerror = () => { if (!isReloading && !isManualDisconnect) updateWSStatus('reconnect','ERROR'); };
        } catch(e) { updateWSStatus('fallback','FALLBACK'); isUsingFallback=true; }
    }
    
    let heartbeatInterval, stuckCheckInterval, restFallbackInterval, mtfUpdateInterval = null;
    
    async function fullReload() {
        if (isReloading) { reloadQueue = true; return; }
        isReloading = true; reloadQueue = false;
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (stuckCheckInterval) clearInterval(stuckCheckInterval);
        if (restFallbackInterval) clearInterval(restFallbackInterval);
        if (mtfUpdateInterval) clearInterval(mtfUpdateInterval);
        cleanupWebSocket();
        const requestId = Date.now(); currentRequestId = requestId;
        document.querySelectorAll('[data-pair]').forEach(btn => { if (btn.getAttribute('data-pair') === currentPair) btn.classList.add('active'); else btn.classList.remove('active'); });
        document.querySelectorAll('.tf-btn').forEach(btn => { const tf = btn.getAttribute('data-tf'); if (tf === currentTF) btn.classList.add('active'); else btn.classList.remove('active'); });
        updateWSStatus('connecting','LOADING');
        
        const thresholds = THRESHOLDS[currentMode] || THRESHOLDS.conservative;
        consoleManager.addEventLog(`INIT ${currentPair} ${currentTF} | MODE: ${currentMode.toUpperCase()} | PURE FRACTAL 30c`);
        
        await fetchKlines(); if (currentRequestId !== requestId) { isReloading = false; return; }
        await updateMTFBias(); if (currentRequestId !== requestId) { isReloading = false; return; }
        initWebSocket();
        heartbeatInterval = setInterval(() => { if (wsConnection?.readyState===WebSocket.OPEN) try { wsConnection.send(JSON.stringify({method:"ping"})); } catch(e) {} }, 30000);
        stuckCheckInterval = setInterval(() => {
            const now=Date.now(), timeSinceLastPrice = now-lastPriceUpdateTime;
            if (timeSinceLastPrice>10000 && lastPrice>0 && !isDataStale) updateWSStatus('stale');
            else if (isDataStale && timeSinceLastPrice<5000) updateWSStatus(isUsingFallback?'fallback':'live');
            const timeSinceLastMsg = now-lastWSMessageTime;
            if (wsConnection?.readyState===WebSocket.OPEN && timeSinceLastMsg>10000 && !isUsingFallback && !isReloading) { updateWSStatus('fallback'); isUsingFallback=true; fetchPriceREST(); }
            if (wsConnection?.readyState!==WebSocket.OPEN && !isReloading && !isManualDisconnect) updateWSStatus('reconnect');
        }, 5000);
        restFallbackInterval = setInterval(fetchPriceREST, 5000);
        mtfUpdateInterval = setInterval(() => { updateMTFBias(); }, currentTF === '5m' ? 30000 : 120000);
        isReloading = false;
        if (reloadQueue) setTimeout(() => fullReload(), 100);
    }
    
    // Event Listeners
    document.querySelectorAll('[data-pair]').forEach(btn => btn.onclick = () => { if(!isReloading){ currentPair=btn.getAttribute('data-pair'); localStorage.setItem('lastPair_v2',currentPair); fullReload(); } });
    document.querySelectorAll('.tf-btn').forEach(btn => btn.onclick = () => { if(!isReloading){ currentTF=btn.getAttribute('data-tf'); localStorage.setItem('lastTF_v2',currentTF); fullReload(); } });
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.onclick = () => {
            currentMode = btn.getAttribute('data-mode');
            localStorage.setItem('ura_mode', currentMode);
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const thresholds = THRESHOLDS[currentMode] || THRESHOLDS.conservative;
            consoleManager.addEventLog(`MODE: ${currentMode.toUpperCase()} | TH: STRONG ${thresholds.strong}% | ZONE ${thresholds.zone}%`);
            if (!isReloading && lastPrice > 0) {
                updateDecision();
                updateLevels(engine.bias);
            }
        };
    });
    
    setInterval(() => { const now=new Date(); UI.clock.textContent=now.toLocaleTimeString('id-ID'); UI.date.textContent=`${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`; UI.session.textContent = now.getHours()>=7 && now.getHours()<14 ? 'ASIA' : (now.getHours()>=14 && now.getHours()<20 ? 'LONDON' : 'NY'); }, 1000);
    
    // Aktifkan mode dari localStorage
    const savedMode = localStorage.getItem('ura_mode') || 'conservative';
    currentMode = savedMode;
    document.querySelector(`[data-mode="${savedMode}"]`).classList.add('active');
    
    consoleManager.render();
    fullReload();
})();
</script>
</body>
</html>
