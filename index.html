<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>URA · U ARE ADVISOR v0.4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg-primary: #0A0A0C;
            --bg-secondary: #111114;
            --bg-tertiary: #16161A;
            --border-subtle: #222228;
            --text-primary: #EDEDEF;
            --text-secondary: #9898A0;
            --text-tertiary: #5C5C66;
            --accent-green: #10B981;
            --accent-red: #EF4444;
            --accent-blue: #3B82F6;
            --accent-purple: #8B5CF6;
            --accent-orange: #F59E0B;
            --accent-gold: #FBBF24;
            --accent-cyan: #00BFFF;
            --success: #22C55E;
            --warning: #F97316;
            --danger: #DC2626;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            position: fixed; 
            top: 0; 
            left: 0; 
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            padding: 12px 16px;
            gap: 8px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }
        
        .logo-section {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        
        .logo {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }
        
        .logo-accent {
            color: var(--accent-cyan);
            font-weight: 800;
        }
        
        .version-tag {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--accent-cyan);
            background: rgba(0, 191, 255, 0.1);
            padding: 2px 8px;
            border-radius: 100px;
            border: 1px solid rgba(0, 191, 255, 0.2);
        }
        
        .connection-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-secondary);

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;

            transition: all 0.2s ease;
        }
        
        .status-dot.live { background: var(--success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); animation: pulse 2s infinite; }
        .status-dot.connecting { background: var(--warning); animation: pulse 1.5s infinite; }
        .status-dot.reconnect { background: var(--accent-orange); animation: pulse 1s infinite; }
        .status-dot.fallback { background: var(--accent-blue); animation: pulse 1.5s infinite; }
        .status-dot.stale { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            gap: 8px;
        }
        
        .tab-group {
            display: flex;
            gap: 3px;
            background: var(--bg-secondary);
            padding: 3px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);

        .mode-row {

<script>
(function() {
    'use strict';
    console.log('%c🔥 URA v0.4 | TradingView Standard Swing | Fixed swing high/low accuracy', 'color: #00BFFF; font-weight: 700;');
    
    // ==================== KONFIGURASI ====================
    const MAX_POSITIONS = 2;
    const SL_ATR_MULTIPLIER = 1.5;
    const TP_ATR_MULTIPLIER = 1.5;
    
    // ==================== CIRCULAR BUFFER ====================
    class CircularBuffer {
        constructor(maxSize) {
            this.maxSize = maxSize;
            this.data = [];
            this.start = 0;
            this.end = 0;
            this.length = 0;
            this.timestampMap = new Map();
        }
        push(item) {
            if (this.timestampMap.has(item.t)) {
                const existingIdx = this.timestampMap.get(item.t);
                this.data[existingIdx] = item;
                return;
            }
            if (this.length < this.maxSize) {
                this.data.push(item);
                this.timestampMap.set(item.t, this.length);
                this.length++;
                this.end = this.length;
            } else {
                const oldItem = this.data[this.start];
                if (oldItem) this.timestampMap.delete(oldItem.t);
                this.data[this.start] = item;
                this.timestampMap.set(item.t, this.start);
                this.start = (this.start + 1) % this.maxSize;
                this.end = (this.end + 1) % this.maxSize;
            }
        }
        getLatest() { if (this.length === 0) return null; return this.data[(this.end - 1 + this.maxSize) % this.maxSize]; }
        toArray() { if (this.length === 0) return []; const result = []; for (let i = 0; i < this.length; i++) result.push(this.data[(this.start + i) % this.maxSize]); return result; }
        clear() { this.data = []; this.start = 0; this.end = 0; this.length = 0; this.timestampMap.clear(); }
    }
    
    // ==================== DOM Elements ====================
    const UI = {
        dot: document.getElementById('status-dot'), text: document.getElementById('status-text'),
        signalBar: document.getElementById('signal-bar'), priceMain: document.getElementById('live-price'),
        priceChange: document.getElementById('price-change'), decision: document.getElementById('decision-status'),
        arrow: document.getElementById('direction-arrow'), emaValue: document.getElementById('ema-value'),
        emaDistance: document.getElementById('ema-distance'), emaTrend: document.getElementById('ema-trend'),
        adxValue: document.getElementById('adx-value'), diValues: document.getElementById('di-values'),
        adxTrend: document.getElementById('adx-trend'), rsiValue: document.getElementById('rsi-bar-value'),
        rsiFill: document.getElementById('rsi-fill'), swingHigh: document.getElementById('swing-high'),
        swingLow: document.getElementById('swing-low'), entryZoneLow: document.getElementById('entry-zone-low'),
        entryZoneHigh: document.getElementById('entry-zone-high'), tpValue: document.getElementById('tp-value'),
        slValue: document.getElementById('sl-value'), atrValue: document.getElementById('atr-value'),
        rangeValue: document.getElementById('range-value'),
        clock: document.getElementById('clock-display'), date: document.getElementById('date-display'),
        session: document.getElementById('session-tag'), levelsGrid: document.getElementById('levels-grid')
    };
    
    // ==================== CONFIG ====================
    const PAIR_CONFIG = {
        XAUUSDT: { adxThreshold: 22, rsiOverbought: 75, rsiOversold: 25, atrPeriod: 14, entryZoneATRFactor: 0.4 },
        BTCUSDT: { adxThreshold: 20, rsiOverbought: 70, rsiOversold: 30, atrPeriod: 14, entryZoneATRFactor: 0.5 }
    };
    
    // ==================== TRADINGVIEW STANDARD SWING POINTS ====================
    function findSwingPoints(data, timeframe = currentTF) {
        if (!data || data.length < 50) return { swingHigh: 0, swingLow: 0 };
        
        // TradingView standard window (lebih lebar dari sebelumnya)
        const windowMap = {
            '5m': { left: 3, right: 3 },   // 7 candle total
            '15m': { left: 4, right: 4 },  // 9 candle total
            '1h': { left: 5, right: 5 },   // 11 candle total
            '4h': { left: 6, right: 6 }    // 13 candle total
        };
        const cfg = windowMap[timeframe] || { left: 5, right: 5 };
        const { left, right } = cfg;
        
        // Minimum distance: 0.3 x ATR (lebih sensitif)
        const atr = calculateATR(data, 14);
        const minDistance = atr * 0.3;
        
        let swingHighs = [];
        let swingLows = [];
        
        for (let i = left; i < data.length - right; i++) {
            let isHigh = true;
            let isLow = true;
            
            // Cek kiri
            for (let j = i - left; j < i; j++) {
                if (data[j].h >= data[i].h) isHigh = false;
                if (data[j].l <= data[i].l) isLow = false;
                if (!isHigh && !isLow) break;
            }
            
            // Cek kanan (hanya jika masih memungkinkan)
            if (isHigh || isLow) {
                for (let j = i + 1; j <= i + right; j++) {
                    if (data[j].h >= data[i].h) isHigh = false;
                    if (data[j].l <= data[i].l) isLow = false;
                    if (!isHigh && !isLow) break;
                }
            }
            
            // Simpan swing (tanpa volume filter, seperti TradingView)
            if (isHigh) {
                const prevSwing = swingHighs[swingHighs.length - 1];
                if (!prevSwing || Math.abs(data[i].h - prevSwing.price) >= minDistance) {
                    swingHighs.push({ price: data[i].h, idx: i });
                }
            }
            
            if (isLow) {
                const prevSwing = swingLows[swingLows.length - 1];
                if (!prevSwing || Math.abs(data[i].l - prevSwing.price) >= minDistance) {
                    swingLows.push({ price: data[i].l, idx: i });
                }
            }
        }
        
        // Ambil swing terbaru (bukan yang tertinggi/terendah)
        const swingHigh = swingHighs.length ? swingHighs[swingHighs.length - 1].price : Math.max(...data.slice(-50).map(c=>c.h));
        const swingLow = swingLows.length ? swingLows[swingLows.length - 1].price : Math.min(...data.slice(-50).map(c=>c.l));
        
        return { swingHigh, swingLow };
    }
    
    // ==================== CORE FUNCTIONS ====================
    function calculateEMA(data, period) { 
        if (!data || data.length < period) return 0;
        const closes = data.slice(-period * 2).map(c => c.c);
        if (closes.length < period) return 0;
        let ema = closes.slice(0, period).reduce((a,b) => a+b,0) / period;
        const multiplier = 2/(period+1);
        for (let i=period; i<closes.length; i++) ema = (closes[i]-ema)*multiplier + ema;
        return ema;
    }
    
    function calculateATR(data, period=14) { 
        if (!data || data.length < period+1) return 0;
        let tr = [];
        for (let i=1; i<data.length; i++) {
            const h = data[i].h, l = data[i].l, pc = data[i-1].c;
            tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
        }
        if (tr.length < period) return 0;
        return tr.slice(-period).reduce((a,b)=>a+b,0)/period;
    }
    
    function calculateADX(data) {
        if (data.length < 28) return 15;
        const period=14;
        let tr=[], plusDM=[], minusDM=[];
        for (let i=1; i<data.length; i++) {
            const h=data[i].h, l=data[i].l, ph=data[i-1].h, pl=data[i-1].l, pc=data[i-1].c;
            tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
            const upMove = h-ph, downMove = pl-l;
            if (upMove > downMove && upMove>0) { plusDM.push(upMove); minusDM.push(0); }
            else if (downMove > upMove && downMove>0) { plusDM.push(0); minusDM.push(downMove); }
            else { plusDM.push(0); minusDM.push(0); }
        }
        let atr = tr.slice(0,period).reduce((a,b)=>a+b,0);
        let pDM = plusDM.slice(0,period).reduce((a,b)=>a+b,0);
        let mDM = minusDM.slice(0,period).reduce((a,b)=>a+b,0);
        let dxValues=[];
        let lastPDI=0, lastMDI=0;
        for (let i=period; i<tr.length; i++) {
            atr = (atr*(period-1)+tr[i])/period;
            pDM = (pDM*(period-1)+plusDM[i])/period;
            mDM = (mDM*(period-1)+minusDM[i])/period;
            lastPDI = atr>0 ? (pDM/atr)*100 : 0;
            lastMDI = atr>0 ? (mDM/atr)*100 : 0;
            const dx = (lastPDI+lastMDI)>0 ? (Math.abs(lastPDI-lastMDI)/(lastPDI+lastMDI))*100 : 0;
            dxValues.push(dx);
        }
        let adxValue;
        if (dxValues.length>=period) {
            let smoothedADX = dxValues.slice(0,period).reduce((a,b)=>a+b,0)/period;
            for (let i=period; i<dxValues.length; i++) smoothedADX = (smoothedADX*(period-1)+dxValues[i])/period;
            adxValue = smoothedADX;
        } else adxValue=15;
        adxValue = Math.max(5, Math.min(100, adxValue));
        return { adx: adxValue, plusDI: lastPDI, minusDI: lastMDI };
    }
    
    function computeRSI(data) {
        if (data.length<15) return 50;
        const closes = data.map(c=>c.c);
        let gains=[], losses=[];
        for (let i=1; i<closes.length; i++) {
            const diff = closes[i]-closes[i-1];
            gains.push(diff>0?diff:0);
            losses.push(diff<0?-diff:0);
        }
        let avgG = gains.slice(0,14).reduce((a,b)=>a+b,0)/14;
        let avgL = losses.slice(0,14).reduce((a,b)=>a+b,0)/14;
        for (let i=14; i<gains.length; i++) {
            avgG = (avgG*13+gains[i])/14;
            avgL = (avgL*13+losses[i])/14;
        }
        return avgL===0?100:100-(100/(1+avgG/avgL));
    }
    
    // ==================== MTF BIAS ====================
    let mtfBiasCache = { h4: "NEUTRAL", h1: "NEUTRAL", m15: "NEUTRAL", m5: "NEUTRAL", timestamp: 0, pair: null };
    let factorStatus = { f1: false, f2: false, f3: false };
    
    function getTimeframeBias(data, emaPeriod = 21) {
        if (!data || data.length < 50) return "NEUTRAL";
        const price = data[data.length-1].c;
        const ema = calculateEMA(data, emaPeriod);
        if (price > ema) return "BULLISH";
        if (price < ema) return "BEARISH";
        return "NEUTRAL";
    }
    
    async function updateMTFBias() {
        const now = Date.now();
        if (mtfBiasCache.timestamp && (now - mtfBiasCache.timestamp) < 120000 && mtfBiasCache.pair === currentPair) {
            updateTimeframeBiasUI();
            const bullishCount = [mtfBiasCache.m5, mtfBiasCache.m15, mtfBiasCache.h1, mtfBiasCache.h4].filter(b=>b==="BULLISH").length;
            const bearishCount = [mtfBiasCache.m5, mtfBiasCache.m15, mtfBiasCache.h1, mtfBiasCache.h4].filter(b=>b==="BEARISH").length;
            factorStatus.f2 = bullishCount >= 3 || bearishCount >= 3;
            return;
        }
        
        const tfs = [{ id: '4h', label: 'h4', apiInterval: '4h' }, { id: '1h', label: 'h1', apiInterval: '1h' }, { id: '15m', label: 'm15', apiInterval: '15m' }, { id: '5m', label: 'm5', apiInterval: '5m' }];
        for (const tf of tfs) {
            try {
                const resp = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${tf.apiInterval}&limit=150`);
                const data = await resp.json();
                if (Array.isArray(data) && data.length > 0) {
                    const formattedData = data.map(d => ({ t:d[0], o:parseFloat(d[1]), h:parseFloat(d[2]), l:parseFloat(d[3]), c:parseFloat(d[4]), v:parseFloat(d[5]) }));
                    const bias = getTimeframeBias(formattedData, 21);
                    if (tf.id === '4h') mtfBiasCache.h4 = bias;
                    else if (tf.id === '1h') mtfBiasCache.h1 = bias;
                    else if (tf.id === '15m') mtfBiasCache.m15 = bias;
                    else if (tf.id === '5m') mtfBiasCache.m5 = bias;
                }
            } catch(e) { console.warn(`MTF ${tf.id} error:`, e); }
        }
        mtfBiasCache.timestamp = now;
        mtfBiasCache.pair = currentPair;
        updateTimeframeBiasUI();
        const bullishCount = [mtfBiasCache.m5, mtfBiasCache.m15, mtfBiasCache.h1, mtfBiasCache.h4].filter(b=>b==="BULLISH").length;
        const bearishCount = [mtfBiasCache.m5, mtfBiasCache.m15, mtfBiasCache.h1, mtfBiasCache.h4].filter(b=>b==="BEARISH").length;
        factorStatus.f2 = bullishCount >= 3 || bearishCount >= 3;
    }
    
    function updateTimeframeBiasUI() {
        const tfMap = { '4h': mtfBiasCache.h4, '1h': mtfBiasCache.h1, '15m': mtfBiasCache.m15, '5m': mtfBiasCache.m5 };

            symbolSpan.textContent = symbol;
            symbolSpan.className = `tf-bias-symbol ${biasClass}`;
        });

    // ==================== LEVEL SMC ====================
    function updateLevels(active, action) {
        const candleArray = getCandleArray();
        if (candleArray.length === 0) return;
        const { swingHigh, swingLow } = findSwingPoints(candleArray, currentTF);
        engine.swingHigh = swingHigh;
        engine.swingLow = swingLow;
        const range = swingHigh - swingLow;
        if (range <= 0) return;
        const price = lastPrice;
        
        let levelBias;
        if (active === 'conservative' || active === 'sniper' || active === 'retail') {
            levelBias = (action === "BUY") ? "BULLISH" : "BEARISH";
        } else {
            levelBias = price > (swingHigh+swingLow)/2 ? "BULLISH" : "BEARISH";
        }
        engine.bias = levelBias;
        
        const f618 = levelBias === "BULLISH" ? swingLow + range*0.618 : swingHigh - range*0.618;
        const f786 = levelBias === "BULLISH" ? swingLow + range*0.786 : swingHigh - range*0.786;
        const atr = calculateATR(candleArray, getConfig().atrPeriod);
        engine.atr = atr;
        const entryFactor = getConfig().entryZoneATRFactor;
        
        engine.entryZoneLow = Math.min(f618, f786) - atr * entryFactor;
        engine.entryZoneHigh = Math.max(f618, f786) + atr * entryFactor;
        
        if (levelBias === "BULLISH") {
            engine.tp = price + (atr * TP_ATR_MULTIPLIER);
            engine.sl = price - (atr * SL_ATR_MULTIPLIER);
        } else {
            engine.tp = price - (atr * TP_ATR_MULTIPLIER);
            engine.sl = price + (atr * SL_ATR_MULTIPLIER);
        }
        
        const prec = getPrecision();
        UI.swingHigh.textContent = swingHigh.toFixed(prec);
        UI.swingLow.textContent = swingLow.toFixed(prec);
        UI.entryZoneLow.textContent = engine.entryZoneLow.toFixed(prec);
        UI.entryZoneHigh.textContent = engine.entryZoneHigh.toFixed(prec);
        UI.tpValue.textContent = engine.tp.toFixed(prec);
        UI.slValue.textContent = engine.sl.toFixed(prec);
        UI.atrValue.textContent = atr.toFixed(prec);
        const rangePoints = currentPair === "XAUUSDT" ? range.toFixed(2) : range.toFixed(1);
        UI.rangeValue.textContent = `${rangePoints} pts`;
    }
    
    // ==================== DECISION ENGINE ====================
    let engine = { swingHigh: 0, swingLow: 0, bias: "NEUTRAL", adxBias: "NEUTRAL", adx: 0, ema21: 0, plusDI: 0, minusDI: 0, atr: 0, entryZoneLow: 0, entryZoneHigh: 0, tp: 0, sl: 0 };
    let currentPair = localStorage.getItem('lastPair') || "XAUUSDT";
    let currentTF = localStorage.getItem('lastTF') || "15m";
    let wsConnection = null;
    let candleBuffer = new CircularBuffer(150);
    let isReloading = false, reloadQueue = false, currentRequestId = null;
    let lastPriceUpdateTime = 0, lastWSMessageTime = 0;
    let isDataStale = false, isUsingFallback = false, isManualDisconnect = false;
    let reconnectDelay = 1000, reconnectTimer = null;
    let lastPrice = 0, prevPrice = 0;
    let lastUIUpdateTime = 0, pendingUIUpdate = false;
    let cachedCandleArray = null, lastCacheTime = 0;
    
    // Active signals tracking
    let activeSignals = [];
    
    function getActiveSignalCount(direction) {
        return activeSignals.filter(s => s.direction === direction && s.pair === currentPair && s.timeframe === currentTF).length;
    }
    
    function addActiveSignal(direction, price, sl, tp, mode) {
        activeSignals.push({
            direction: direction,
            price: price,
            sl: sl,
            tp: tp,
            mode: mode,
            pair: currentPair,
            timeframe: currentTF,
            timestamp: Date.now()
        });
        if (activeSignals.length > MAX_POSITIONS * 2) activeSignals = activeSignals.slice(-MAX_POSITIONS * 2);
    }
    
    function checkSLTPHit() {
        const candleArray = getCandleArray();
        if (candleArray.length === 0) return;
        const currentHigh = Math.max(...candleArray.slice(-5).map(c => c.h));
        const currentLow = Math.min(...candleArray.slice(-5).map(c => c.l));
        
        for (let i = 0; i < activeSignals.length; i++) {
            const sig = activeSignals[i];
            if (sig.pair !== currentPair || sig.timeframe !== currentTF) continue;
            
            const isBuy = sig.direction === 'BUY';
            if (isBuy && currentHigh >= sig.tp) {
                activeSignals.splice(i, 1);
                i--;
            } else if (!isBuy && currentLow <= sig.tp) {
                activeSignals.splice(i, 1);
                i--;
            } else if (isBuy && currentLow <= sig.sl) {
                activeSignals.splice(i, 1);
                i--;
            } else if (!isBuy && currentHigh >= sig.sl) {
                activeSignals.splice(i, 1);
                i--;
            }
        }
    }
    
    function getPrecision() { return currentPair === "XAUUSDT" ? 2 : 1; }
    function getConfig() { return PAIR_CONFIG[currentPair]; }
    
    function getCandleArray() { const now = Date.now(); if (!cachedCandleArray || (now - lastCacheTime) > 500) { cachedCandleArray = candleBuffer.toArray(); lastCacheTime = now; } return cachedCandleArray; }
    function invalidateCandleCache() { cachedCandleArray = null; }
    
    function throttledUIUpdate(price, force = false) {
        const now = Date.now();
        if (force || now - lastUIUpdateTime >= 100) {
            lastUIUpdateTime = now;
            updateUI(price);
            pendingUIUpdate = false;
        } else if (!pendingUIUpdate) {
            pendingUIUpdate = true;
            setTimeout(() => { if (pendingUIUpdate) { updateUI(lastPrice); pendingUIUpdate = false; } }, 100);
        }
    }
    
    function updateDecision() {
        if (isDataStale) {
            UI.decision.textContent = 'DATA STALE';
            UI.decision.style.color = 'var(--warning)';
            UI.signalBar.style.background = 'rgba(220,38,38,0.1)';
            return;
        }
        const candleArray = getCandleArray();
        if (candleArray.length === 0) return;
        const p = lastPrice;
        const config = getConfig();
        const prec = getPrecision();
        
        engine.ema21 = calculateEMA(candleArray, 21);
        const adxResult = calculateADX(candleArray);
        engine.adx = adxResult.adx;
        engine.plusDI = adxResult.plusDI;
        engine.minusDI = adxResult.minusDI;
        engine.adxBias = engine.plusDI > engine.minusDI ? "BULLISH" : (engine.minusDI > engine.plusDI ? "BEARISH" : "NEUTRAL");
        
        const isRanging = engine.adx < 20;
        
        const bullishCount = [mtfBiasCache.m5, mtfBiasCache.m15, mtfBiasCache.h1, mtfBiasCache.h4].filter(b=>b==="BULLISH").length;
        const bearishCount = [mtfBiasCache.m5, mtfBiasCache.m15, mtfBiasCache.h1, mtfBiasCache.h4].filter(b=>b==="BEARISH").length;
        factorStatus.f2 = bullishCount >= 3 || bearishCount >= 3;
        
        const { swingHigh, swingLow } = findSwingPoints(candleArray, currentTF);
        const tempBias = p > (swingHigh+swingLow)/2 ? "BULLISH" : "BEARISH";
        engine.bias = tempBias;
        
        const rsi = computeRSI(candleArray);
        
        UI.rsiValue.textContent = rsi.toFixed(1);
        UI.rsiFill.style.width = Math.min(100, Math.max(0, rsi)) + '%';
        UI.rsiFill.className = 'rsi-fill';
        if (rsi < config.rsiOversold) UI.rsiFill.classList.add('oversold');
        else if (rsi > config.rsiOverbought) UI.rsiFill.classList.add('overbought');
        else UI.rsiFill.classList.add('neutral');
        
        UI.emaValue.textContent = engine.ema21.toFixed(prec);
        UI.emaDistance.textContent = `${(p>engine.ema21?'+':'')}${(p-engine.ema21).toFixed(prec)} (${((p-engine.ema21)/engine.ema21*100).toFixed(2)}%)`;
        UI.emaTrend.textContent = p>engine.ema21?'▲':'▼';
        UI.emaTrend.style.color = p>engine.ema21?'var(--accent-green)':'var(--accent-red)';
        UI.adxValue.textContent = Math.round(engine.adx);
        if (engine.adx<config.adxThreshold) UI.adxValue.classList.add('adx-warning');
        else UI.adxValue.classList.remove('adx-warning');
        UI.diValues.textContent = `+DI ${Math.round(engine.plusDI)} | -DI ${Math.round(engine.minusDI)}`;
        UI.adxTrend.textContent = engine.plusDI>engine.minusDI?'▲':'▼';
        UI.adxTrend.style.color = engine.plusDI>engine.minusDI?'var(--accent-green)':'var(--accent-red)';
        
        // Calculate entry zone
        const range = swingHigh - swingLow;
        const f618 = tempBias === "BULLISH" ? swingLow + range*0.618 : swingHigh - range*0.618;
        const f786 = tempBias === "BULLISH" ? swingLow + range*0.786 : swingHigh - range*0.786;
        const tempATR = calculateATR(candleArray, config.atrPeriod);
        const tempEntryLow = Math.min(f618, f786) - tempATR * config.entryZoneATRFactor;
        const tempEntryHigh = Math.max(f618, f786) + tempATR * config.entryZoneATRFactor;
        const inZoneTemp = p >= tempEntryLow && p <= tempEntryHigh;
        const adxValid = engine.adx >= config.adxThreshold;
        const f1 = tempBias !== "NEUTRAL";
        const f3 = adxValid && inZoneTemp;
        
        let score = 0;
        if (f1) score += 3;
        if (factorStatus.f2) score += 2;
        if (f3) score += 2;
        score = Math.min(10, score);
        
        const direction = engine.adxBias;
        const action = direction === "BULLISH" ? "BUY" : "SELL";
        UI.arrow.innerHTML = direction === "BULLISH" ? '▲' : '▼';
        UI.arrow.style.color = direction === "BULLISH" ? 'var(--accent-green)' : 'var(--accent-red)';
        
        let active = null;
        let decisionText = '', color = '', bgColor = '';
        const isInValidZone = inZoneTemp;
        
        if (isRanging) {
            decisionText = `🔄 SIDEWAYS`;
            color = 'var(--accent-gold)';
            bgColor = 'rgba(245,158,11,0.1)';
            active = null;
        }
        else if (!adxValid) { 
            decisionText = `📉 WEAK TREND`; 
            color = 'var(--warning)'; 
            bgColor = 'rgba(245,158,11,0.1)'; 
            active = null; 
        }
        else if (!isInValidZone) { 
            decisionText = `📍 OUT OF ZONE`; 
            color = 'var(--warning)'; 
            bgColor = 'rgba(245,158,11,0.1)'; 
            active = null; 
        }
        else {
            const activeCount = getActiveSignalCount(action);
            if (activeCount >= MAX_POSITIONS) {
                decisionText = `⏸️ MAX POSITION (${MAX_POSITIONS})`;
                color = 'var(--accent-gold)';
                bgColor = 'var(--bg-secondary)';
                active = null;
            }
            else if (activeCount === 1) {
                decisionText = `🔄 PULLBACK HOLD`;
                color = 'var(--accent-gold)';
                bgColor = 'var(--bg-secondary)';
                active = null;
            }
            else if (adxValid && f1 && factorStatus.f2 && f3 && score >= 8 && engine.adx >= 25) {
                active = 'conservative';
                decisionText = `CONSERVATIVE ${action}`;
                color = 'var(--accent-green)';
                bgColor = 'rgba(16,185,129,0.08)';
            }
            else if (adxValid && f1 && score >= 7 && inZoneTemp) {
                active = 'sniper';
                decisionText = `SNIPER ${action}`;
                color = 'var(--accent-purple)';
                bgColor = 'rgba(139,92,246,0.08)';
            }
            else if (adxValid && f1 && score >= 5 && inZoneTemp && rsi >= 40 && rsi <= 60) {
                active = 'retail';
                decisionText = `RETAIL ${action}`;
                color = 'var(--accent-orange)';
                bgColor = 'rgba(245,158,11,0.08)';
            }
            else if (score >= 4) { 
                decisionText = `⏳ AWAITING CONFIRM`; 
                color = 'var(--accent-gold)'; 
                bgColor = 'var(--bg-secondary)'; 
                active = null; 
            }
            else { 
                decisionText = `NO SETUP`; 
                color = 'var(--text-tertiary)'; 
                bgColor = 'var(--bg-secondary)'; 
                active = null; 
            }
        }
        
        document.querySelectorAll('.mode-btn-large').forEach(btn => btn.classList.remove('active'));
        if (active === 'conservative') document.querySelector('[data-mode="conservative"]')?.classList.add('active');
        else if (active === 'sniper') document.querySelector('[data-mode="sniper"]')?.classList.add('active');
        else if (active === 'retail') document.querySelector('[data-mode="retail"]')?.classList.add('active');
        
        updateLevels(active, action);
        
        let displayText = '';
        if (active === 'conservative' || active === 'sniper' || active === 'retail') {
            displayText = `${action} NOW 🔥`;
            addActiveSignal(action, lastPrice, engine.sl, engine.tp, active);
        } else {
            displayText = decisionText;
        }
        UI.decision.textContent = displayText;
        UI.decision.style.color = color;
        UI.signalBar.style.background = bgColor;
        UI.signalBar.style.borderColor = active ? color : 'var(--border-subtle)';
        UI.levelsGrid.classList.toggle('zone-warning', !isInValidZone && adxValid);
    }
    
    function updateUI(price) {
        const p = safeValue(price,0);
        const prec = getPrecision();
        const fixed = p.toFixed(prec);
        const parts = fixed.split('.');
        UI.priceMain.innerHTML = `${parts[0]}<span class="price-decimal">.${parts[1]||'00'}</span>`;
        UI.priceMain.style.color = p>prevPrice ? 'var(--accent-green)' : (p<prevPrice ? 'var(--accent-red)' : 'var(--text-primary)');
        if (prevPrice>0) {
            const change = p-prevPrice;
            const pct = (change/prevPrice)*100;

            UI.priceChange.style.color = change>0?'var(--accent-green)':'var(--accent-red)';
        }
        lastPrice = p;
        prevPrice = p;
        updateDecision();
        checkSLTPHit();
    }
    
    function safeValue(val, fallback=0) { return (typeof val==='number' && !isNaN(val) && isFinite(val)) ? val : fallback; }
    
    // ==================== WEBSOCKET ====================

        UI.dot.className = 'status-dot';
        if (status==='live') { UI.dot.classList.add('live'); UI.text.innerText=message||'LIVE'; reconnectDelay=1000; isUsingFallback=false; isDataStale=false; }

        else if (status==='reconnect') { UI.dot.classList.add('reconnect'); UI.text.innerText=message||'RECONNECT'; }

        else if (status==='stale') { UI.dot.classList.add('stale'); UI.text.innerText=message||'DATA STALE'; isDataStale=true; }

            wsConnection=null;

        setTimeout(()=>{ isManualDisconnect=false; },100);

        try {
            const resp = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${currentTF}&limit=150`);

        return false;
    }
    
    async function fetchPriceREST() {
        try {
            const resp = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${currentPair}`);
            const data = await resp.json();
            if (data?.price) {
                const price = parseFloat(data.price);
                if (price>0 && (Date.now()-lastWSMessageTime>3000 || isUsingFallback)) {
                    lastPriceUpdateTime = Date.now();
                    throttledUIUpdate(price, true);
                }
            }
        } catch(e) {}
    }
    
    function initWebSocket() {
        cleanupWebSocket();
        updateWSStatus('connecting','CONNECTING');
        const streamName = `${currentPair.toLowerCase()}@kline_${currentTF}`;
        const wsUrl = `wss://fstream.binance.com/ws/${streamName}`;
        try {
            wsConnection = new WebSocket(wsUrl);
            wsConnection.onopen = () => { reconnectDelay=1000; lastWSMessageTime=lastPriceUpdateTime=Date.now(); isUsingFallback=false; isDataStale=false; updateWSStatus('live', `LIVE ${currentTF}`); };
            wsConnection.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg?.k) {
                        const k = msg.k;
                        const price = parseFloat(k.c);
                        const high = parseFloat(k.h);
                        const low = parseFloat(k.l);
                        const open = parseFloat(k.o);
                        const isClosed = k.x;
                        const candleTime = k.t;
                        if (price > 0) {
                            lastWSMessageTime = lastPriceUpdateTime = Date.now();
                            if (isUsingFallback) updateWSStatus('live', `LIVE ${currentTF}`);
                            if (isDataStale) updateWSStatus('live', `LIVE ${currentTF}`);
                            const candleArray = getCandleArray();
                            if (candleArray.length > 0) {
                                const lastCandle = candleArray[candleArray.length - 1];
                                if (isClosed && lastCandle.t !== candleTime) {
                                    candleBuffer.push({ t: candleTime, o: open, h: high, l: low, c: price, v: parseFloat(k.v) });
                                    invalidateCandleCache();
                                } else if (!isClosed && lastCandle.t === candleTime) {
                                    lastCandle.c = price;
                                    lastCandle.h = Math.max(lastCandle.h, high);
                                    lastCandle.l = Math.min(lastCandle.l, low);
                                    lastCandle.o = lastCandle.o || open;
                                    invalidateCandleCache();
                                }
                            }
                            throttledUIUpdate(price);
                        }
                    }
                } catch(err) {}
            };
            wsConnection.onclose = () => { if (!isReloading && !isManualDisconnect) { updateWSStatus('reconnect','RECONNECT'); if (reconnectTimer) clearTimeout(reconnectTimer); reconnectTimer = setTimeout(() => { if (!isReloading && !isManualDisconnect) { reconnectDelay = Math.min(reconnectDelay*1.5, 30000); initWebSocket(); } }, reconnectDelay); } };
            wsConnection.onerror = () => { if (!isReloading && !isManualDisconnect) updateWSStatus('reconnect','ERROR'); };
        } catch(e) { updateWSStatus('fallback','FALLBACK'); isUsingFallback=true; }
    }
    
    let heartbeatInterval, stuckCheckInterval, restFallbackInterval, mtfUpdateInterval = null;
    
    async function fullReload() {
        if (isReloading) { reloadQueue = true; return; }
        isReloading = true;
        reloadQueue = false;
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (stuckCheckInterval) clearInterval(stuckCheckInterval);
        if (restFallbackInterval) clearInterval(restFallbackInterval);
        if (mtfUpdateInterval) clearInterval(mtfUpdateInterval);
        cleanupWebSocket();
        const requestId = Date.now();
        currentRequestId = requestId;
        document.querySelectorAll('[data-pair]').forEach(btn => { if (btn.getAttribute('data-pair') === currentPair) btn.classList.add('active'); else btn.classList.remove('active'); });
        document.querySelectorAll('.tf-btn').forEach(btn => { const tf = btn.getAttribute('data-tf'); if (tf === currentTF) btn.classList.add('active'); else btn.classList.remove('active'); });
        updateWSStatus('connecting','LOADING');
        engine = { swingHigh:0, swingLow:0, bias:"NEUTRAL", adxBias:"NEUTRAL", adx:0, ema21:0, plusDI:0, minusDI:0, atr:0, entryZoneLow:0, entryZoneHigh:0, tp:0, sl:0 };
        factorStatus = { f1:false, f2:false, f3:false };
        activeSignals = [];
        await fetchKlines();
        if (currentRequestId !== requestId) return;
        await updateMTFBias();
        if (currentRequestId !== requestId) return;
        initWebSocket();
        heartbeatInterval = setInterval(() => { if (wsConnection?.readyState===WebSocket.OPEN) try { wsConnection.send(JSON.stringify({method:"ping"})); } catch(e) {} }, 30000);
        stuckCheckInterval = setInterval(() => {
            const now=Date.now();
            const timeSinceLastPrice = now-lastPriceUpdateTime;
            if (timeSinceLastPrice>10000 && lastPrice>0 && !isDataStale) updateWSStatus('stale');
            else if (isDataStale && timeSinceLastPrice<5000) updateWSStatus(isUsingFallback?'fallback':'live');
            const timeSinceLastMsg = now-lastWSMessageTime;
            if (wsConnection?.readyState===WebSocket.OPEN && timeSinceLastMsg>10000 && !isUsingFallback && !isReloading) { updateWSStatus('fallback'); isUsingFallback=true; fetchPriceREST(); }
            if (wsConnection?.readyState!==WebSocket.OPEN && !isReloading && !isManualDisconnect) updateWSStatus('reconnect');
        }, 5000);
        restFallbackInterval = setInterval(fetchPriceREST, 5000);
        const mtfInterval = currentTF === '5m' ? 30000 : 120000;
        mtfUpdateInterval = setInterval(() => { updateMTFBias(); }, mtfInterval);
        isReloading = false;
        if (reloadQueue) setTimeout(() => fullReload(), 100);
    }
    
    setInterval(() => { checkSLTPHit(); }, 5000);
    
    document.querySelectorAll('[data-pair]').forEach(btn => btn.onclick = () => { if(!isReloading){ currentPair=btn.getAttribute('data-pair'); localStorage.setItem('lastPair',currentPair); fullReload(); } });
    document.querySelectorAll('.tf-btn').forEach(btn => btn.onclick = () => { if(!isReloading){ currentTF=btn.getAttribute('data-tf'); localStorage.setItem('lastTF',currentTF); fullReload(); } });
    
    window.copySwingHL = () => { navigator.clipboard?.writeText(`Swing H: ${UI.swingHigh.textContent} | L: ${UI.swingLow.textContent}`); };
    window.copyEntryZone = () => { navigator.clipboard?.writeText(`Entry Zone: ${UI.entryZoneLow.textContent} / ${UI.entryZoneHigh.textContent}`); };
    window.smartCopy = (id) => { const el = document.getElementById(id); if(el){ navigator.clipboard?.writeText(el.textContent.trim()); el.classList.add('copied'); setTimeout(()=>el.classList.remove('copied'),300); } };
    
    setInterval(() => { const now=new Date(); UI.clock.textContent=now.toLocaleTimeString('id-ID'); UI.date.textContent=`${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`; UI.session.textContent = now.getHours()>=7 && now.getHours()<14 ? 'ASIA' : (now.getHours()>=14 && now.getHours()<20 ? 'LONDON' : 'NY'); }, 1000);
    
    fullReload();
})();
</script>
