<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMC APEX · BIAS ENGINE v23.9</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg-primary: #0A0A0C;
            --bg-secondary: #111114;
            --bg-tertiary: #16161A;
            --border-subtle: #222228;
            --border-active: #2A2A32;
            --text-primary: #EDEDEF;
            --text-secondary: #9898A0;
            --text-tertiary: #5C5C66;
            --accent-green: #10B981;
            --accent-red: #EF4444;
            --accent-blue: #3B82F6;
            --accent-purple: #8B5CF6;
            --accent-orange: #F59E0B;
            --accent-gold: #FBBF24;
            --accent-cyan: #00BFFF;
            --success: #22C55E;
            --warning: #F97316;
            --danger: #DC2626;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            position: fixed; 
            top: 0; 
            left: 0; 
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            padding: 12px 16px;
            gap: 8px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }
        
        .logo-section {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        
        .logo {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }
        
        .logo-accent {
            color: var(--accent-cyan);
            font-weight: 800;
        }
        
        .version-tag {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--accent-cyan);
            background: rgba(0, 191, 255, 0.1);
            padding: 2px 8px;
            border-radius: 100px;
            border: 1px solid rgba(0, 191, 255, 0.2);
        }
        
        .connection-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-tertiary);
            transition: all 0.2s ease;
        }
        
        .status-dot.live { background: var(--success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); animation: pulse 2s infinite; }
        .status-dot.connecting { background: var(--warning); animation: pulse 1.5s infinite; }
        .status-dot.reconnect { background: var(--accent-orange); animation: pulse 1s infinite; }
        .status-dot.fallback { background: var(--accent-blue); animation: pulse 1.5s infinite; }
        .status-dot.stale { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            gap: 8px;
        }
        
        .tab-group {
            display: flex;
            gap: 3px;
            background: var(--bg-secondary);
            padding: 3px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: baseline;
            gap: 2px;
        }
        
        .tab-btn.active {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }
        
        .tab-btn[data-pair] {
            /* normal */
        }
        
        .tf-label {
            transition: color 0.15s ease;
        }
        
        .tab-btn.active .tf-label {
            color: var(--text-primary);
        }
        
        .tab-btn:not(.active) .tf-label {
            color: var(--text-tertiary);
        }
        
        .tf-bias-symbol {
            font-weight: 600;
        }
        .tf-bias-symbol.bullish { color: var(--accent-green); }
        .tf-bias-symbol.bearish { color: var(--accent-red); }
        .tf-bias-symbol.neutral { color: var(--text-tertiary); }
        
        .tab-btn.disabled { opacity: 0.5; cursor: wait; pointer-events: none; }
        
        .mode-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .mode-btn-large {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            color: var(--text-tertiary);
            padding: 7px 5px;
            font-size: 0.55rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            letter-spacing: 0.3px;
        }
        
        .mode-btn-large.active { 
            background: var(--bg-tertiary);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 6px rgba(0,191,255,0.3);
        }
        
        .signal-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .signal-content {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        
        .signal-badge {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }
        
        .signal-text {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        
        .signal-arrow {
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 1;
        }
        
        .price-section {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 4px 0;
            flex-shrink: 0;
        }
        
        .price-main {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1;
            cursor: pointer;
        }
        
        .price-decimal { font-size: 1.5rem; opacity: 0.5; font-weight: 500; }
        
        .price-change {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 100px;
            background: var(--bg-secondary);
        }
        
        .metrics-duo {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .metric-card {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 8px 10px;
        }
        
        .metric-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        
        .metric-label {
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }
        
        .metric-value {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        
        .metric-sub {
            font-size: 0.55rem;
            color: var(--text-secondary);
        }
        
        .adx-warning {
            color: var(--warning) !important;
        }
        
        .rsi-bar-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 8px 12px;
            flex-shrink: 0;
            cursor: pointer;
        }
        
        .rsi-bar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .rsi-bar-title {
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
        }
        
        .rsi-bar-value {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .rsi-track {
            height: 2px;
            background: var(--bg-tertiary);
            border-radius: 100px;
            overflow: hidden;
            margin: 6px 0 4px;
        }
        
        .rsi-fill {
            height: 100%;
            width: 50%;
            border-radius: 100px;
            transition: width 0.3s ease, background 0.3s ease;
            background: var(--accent-purple);
        }
        
        .rsi-fill.oversold { background: var(--accent-green); }
        .rsi-fill.overbought { background: var(--accent-red); }
        .rsi-fill.neutral { background: var(--accent-purple); }
        
        .rsi-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.45rem;
            color: var(--text-tertiary);
        }
        
        .ob-card {
            background: linear-gradient(135deg, rgba(0, 191, 255, 0.03) 0%, transparent 100%);
            border: 1px solid rgba(0, 191, 255, 0.15);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .ob-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .ob-title {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-cyan);
        }
        
        .ob-bias {
            font-size: 0.55rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 100px;
            background: var(--bg-tertiary);
        }
        
        .ob-bias.bullish { background: rgba(16, 185, 129, 0.12); color: var(--accent-green); }
        .ob-bias.bearish { background: rgba(239, 68, 68, 0.12); color: var(--accent-red); }
        
        .ob-range-bar {
            height: 3px;
            background: var(--bg-tertiary);
            border-radius: 100px;
            overflow: hidden;
            margin: 5px 0;
        }
        
        .ob-range-fill {
            height: 100%;
            width: 0%;
            transition: width 0.2s ease;
        }
        
        .ob-range-fill.bullish { background: var(--accent-green); }
        .ob-range-fill.bearish { background: var(--accent-red); }
        
        .ob-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.5rem;
            color: var(--text-tertiary);
        }
        
        .zone-warning {
            background: rgba(245, 158, 11, 0.15) !important;
            border-color: var(--warning) !important;
        }
        
        .levels-grid-vertical {
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 8px 12px;
            flex-shrink: 0;
            gap: 6px;
        }
        
        .level-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            cursor: pointer;
            padding: 2px 0;
            border-bottom: 1px dashed var(--border-subtle);
        }
        .level-row:last-child { border-bottom: none; }
        
        .level-label-lg {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        
        .level-value-lg {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: right;
            font-family: 'Inter', monospace;
            letter-spacing: 0.2px;
        }
        
        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 5px;
            border-top: 1px solid var(--border-subtle);
            flex-shrink: 0;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .session-info {
            display: flex;
            gap: 10px;
            font-size: 0.55rem;
        }
        
        .session-label {
            color: var(--text-tertiary);
            margin-right: 4px;
        }
        
        .session-value {
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .clock {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-tertiary);
        }
        
        .copied { background: rgba(0, 191, 255, 0.15) !important; }
        .decision-animate { animation: decisionPulse 0.3s ease; }
        @keyframes decisionPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.01); } }
        
        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }
        .text-gold { color: var(--accent-gold); }
        .text-blue { color: var(--accent-blue); }
        .text-cyan { color: var(--accent-cyan); }
        
        @media (max-width: 480px) {
            .footer-left { gap: 8px; }
            .session-info { gap: 6px; }
            .tab-btn { padding: 4px 8px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <span class="logo">SMC<span class="logo-accent">·</span>APEX</span>
            <span class="version-tag">v23.9</span>
        </div>
        <div class="connection-badge">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">CONNECTING</span>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="tab-group">
            <button class="tab-btn" data-pair="XAUUSDT">XAUUSD</button>
            <button class="tab-btn" data-pair="BTCUSDT">BTCUSD</button>
        </div>
        <div class="tab-group" id="tf-group">
            <button class="tab-btn tf-btn" data-tf="4h"><span class="tf-label">H4</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn" data-tf="1h"><span class="tf-label">H1</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn active" data-tf="15m"><span class="tf-label">M15</span><span class="tf-bias-symbol"></span></button>
            <button class="tab-btn tf-btn" data-tf="5m"><span class="tf-label">M5</span><span class="tf-bias-symbol"></span></button>
        </div>
    </nav>

    <div class="mode-row">
        <button class="mode-btn-large" data-mode="conservative">🛡️ CONSERVATIVE</button>
        <button class="mode-btn-large" data-mode="sniper">🎯 SNIPER</button>
        <button class="mode-btn-large" data-mode="retail">🔵 RETAIL</button>
    </div>

    <div class="signal-bar" id="signal-bar" onclick="smartCopy('decision-status')">
        <div class="signal-content">
            <span class="signal-badge">SIGNAL</span>
            <span class="signal-text" id="decision-status">ANALYZING</span>
        </div>
        <div class="signal-arrow" id="direction-arrow">—</div>
    </div>

    <div class="price-section">
        <div class="price-main" id="live-price" onclick="smartCopy('live-price')">0.00</div>
        <div class="price-change" id="price-change"></div>
    </div>

    <div class="metrics-duo">
        <div class="metric-card">
            <div class="metric-header"><span class="metric-label">EMA 21</span><span id="ema-trend">—</span></div>
            <div class="metric-value" id="ema-value">—</div>
            <div class="metric-sub" id="ema-distance">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-header"><span class="metric-label">ADX / DI</span><span id="adx-trend">—</span></div>
            <div class="metric-value" id="adx-value">—</div>
            <div class="metric-sub" id="di-values">—</div>
        </div>
    </div>

    <div class="rsi-bar-container" id="rsi-bar-container" onclick="smartCopy('rsi-bar-value')">
        <div class="rsi-bar-header">
            <span class="rsi-bar-title">RSI (14)</span>
            <span class="rsi-bar-value" id="rsi-bar-value">—</span>
        </div>
        <div class="rsi-track"><div class="rsi-fill" id="rsi-fill"></div></div>
        <div class="rsi-labels"><span>OVERSOLD (30)</span><span>NEUTRAL</span><span>OVERBOUGHT (70)</span></div>
    </div>

    <div class="ob-card" id="ob-card" onclick="smartCopy('ob-card')">
        <div class="ob-header">
            <span class="ob-title">📦 ORDER BLOCK <span id="ob-type">SCANNING</span></span>
            <span class="ob-bias" id="ob-bias">NEUTRAL</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 600;">
            <span id="ob-high">—</span><span id="ob-mid">—</span><span id="ob-low">—</span>
        </div>
        <div class="ob-range-bar"><div class="ob-range-fill" id="ob-range-fill"></div></div>
        <div class="ob-footer">
            <span>STR: <span class="ob-value" id="ob-strength">—</span></span>
            <span>MIT: <span class="ob-value" id="ob-mitigation">—</span></span>
            <span>DIST: <span class="ob-value" id="ob-distance">—</span></span>
        </div>
    </div>

    <div class="levels-grid-vertical" id="levels-grid">
        <div class="level-row" onclick="copySwingHL()">
            <span class="level-label-lg">SWING H/L</span>
            <span class="level-value-lg"><span id="swing-high">—</span> / <span id="swing-low">—</span></span>
        </div>
        <div class="level-row" onclick="smartCopy('sl-value')">
            <span class="level-label-lg">SL (1.5 ATR)</span>
            <span class="level-value-lg text-red" id="sl-value">—</span>
        </div>
        <div class="level-row" onclick="copyEntryZone()">
            <span class="level-label-lg">ENTRY ZONE</span>
            <span class="level-value-lg"><span class="text-gold" id="entry-zone-low">—</span> / <span class="text-gold" id="entry-zone-high">—</span></span>
        </div>
        <div class="level-row" onclick="smartCopy('tp-value')">
            <span class="level-label-lg">TP (27%)</span>
            <span class="level-value-lg text-blue" id="tp-value">—</span>
        </div>
        <div class="level-row" onclick="smartCopy('range-value')">
            <span class="level-label-lg">RANGE (points)</span>
            <span class="level-value-lg" id="range-value">—</span>
        </div>
        <div class="level-row" onclick="smartCopy('atr-value')">
            <span class="level-label-lg">ATR (14)</span>
            <span class="level-value-lg" id="atr-value">—</span>
        </div>
    </div>
    
    <footer class="footer-bar">
        <div class="footer-left">
            <div class="session-info">
                <div><span class="session-label">SESSION</span><span class="session-value" id="session-tag">ASIA</span></div>
                <div><span class="session-label">DATE</span><span class="session-value" id="date-display">—</span></div>
            </div>
            <div class="clock" id="clock-display">00:00:00</div>
        </div>
    </footer>
</div>

    function calculateEMA(data, period) {
        if (!data || data.length < period) return 0;
        const closes = data.slice(-period * 2).map(c => c.c);
        if (closes.length < period) return 0;
        let ema = closes.slice(0, period).reduce((a,b) => a+b,0) / period;
        const multiplier = 2/(period+1);
        for (let i=period; i<closes.length; i++) ema = (closes[i]-ema)*multiplier + ema;
        return ema;
    }
    
    function calculateATR(period=14) {
        if (candleData.length < period+1) return 0;
        let tr = [];
        for (let i=1; i<candleData.length; i++) {
            const h = candleData[i].h, l = candleData[i].l, pc = candleData[i-1].c;
            tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
        }
        if (tr.length < period) return 0;
        let atr = tr.slice(-period).reduce((a,b)=>a+b,0)/period;
        return atr;
    }
    
    function findSwingPoints() {
        if (candleData.length < 20) return { swingHigh: 0, swingLow: 0 };
        let sh = 0, sl = Infinity;
        const left=5, right=5;
        for (let i=left; i<candleData.length-right; i++) {
            let isHigh=true, isLow=true;
            for (let j=i-left; j<=i+right; j++) {
                if (j===i) continue;
                if (candleData[j].h >= candleData[i].h) isHigh=false;
                if (candleData[j].l <= candleData[i].l) isLow=false;
            }
            if (isHigh && candleData[i].h > sh) sh = candleData[i].h;
            if (isLow && candleData[i].l < sl) sl = candleData[i].l;
        }
        if (sh===0) sh = Math.max(...candleData.slice(-50).map(c=>c.h));
        if (sl===Infinity) sl = Math.min(...candleData.slice(-50).map(c=>c.l));
        if (sh <= sl) sh = sl + (currentPair==="XAUUSDT"?5:100);
        return { swingHigh: sh, swingLow: sl };
    }
    
    function getMarketStructureBias(data) {
        if (data.length < 20) return "NEUTRAL";
        let higherHigh = false, higherLow = false, lowerHigh = false, lowerLow = false;
        const recentHigh = Math.max(...data.slice(-10).map(c=>c.h));
        const recentLow = Math.min(...data.slice(-10).map(c=>c.l));
        const previousHigh = Math.max(...data.slice(-20, -10).map(c=>c.h));
        const previousLow = Math.min(...data.slice(-20, -10).map(c=>c.l));
        if (recentHigh > previousHigh) higherHigh = true;
        if (recentLow > previousLow) higherLow = true;
        if (recentHigh < previousHigh) lowerHigh = true;
        if (recentLow < previousLow) lowerLow = true;
        if (higherHigh && higherLow) return "BULLISH";
        if (lowerHigh && lowerLow) return "BEARISH";
        return "NEUTRAL";
    }
    
    function checkOBAlignment(data, direction) {
        if (!orderBlocks.length || direction === "NEUTRAL") return false;
        const latestOB = orderBlocks[orderBlocks.length-1];
        if (direction === "BULLISH" && latestOB.type === "BULLISH") return true;
        if (direction === "BEARISH" && latestOB.type === "BEARISH") return true;
        return false;
    }
    
    function checkFibonacciZone(data) {
        if (candleData.length < 30) return false;
        const { swingHigh, swingLow } = findSwingPoints();
        const range = swingHigh - swingLow;
        if (range <= 0) return false;
        const price = data[data.length-1].c;
        const f618 = engine.bias === "BULLISH" ? swingLow + range*0.618 : swingHigh - range*0.618;
        const f786 = engine.bias === "BULLISH" ? swingLow + range*0.786 : swingHigh - range*0.786;
        const inZone = (price >= Math.min(f618, f786) && price <= Math.max(f618, f786));
        return inZone;
    }
    
    function checkPriceAction(data) {
        if (data.length < 5) return false;
        const last = data[data.length-1];
        const prev = data[data.length-2];
        const isBullishCandle = last.c > last.o;
        const isEngulfing = (last.c > prev.h && last.o < prev.l);
        return isBullishCandle || isEngulfing;
    }
    
    function getTimeframeBias(data, tf, currentPairName) {
        if (!data || data.length < 50) return "NEUTRAL";
        const cfg = MTF_CONFIG[currentPairName][tf];
        if (!cfg) return "NEUTRAL";
        
        const price = data[data.length-1].c;
        let bullishScore = 0, bearishScore = 0;
        
        const ema21 = calculateEMA(data, 21);
        if (price > ema21) bullishScore += 2;
        else if (price < ema21) bearishScore += 2;
        
        if (cfg.emaSlow) {
            const emaSlow = calculateEMA(data, cfg.emaSlow);
            if (price > emaSlow) bullishScore += 2;
            else if (price < emaSlow) bearishScore += 2;
        }
        
        if (cfg.useStructure) {
            const structBias = getMarketStructureBias(data);
            if (structBias === "BULLISH") bullishScore += 2;
            else if (structBias === "BEARISH") bearishScore += 2;
        }
        
        if (cfg.useOB && engine.adxBias !== "NEUTRAL") {
            const obAlign = checkOBAlignment(data, engine.adxBias);
            if (obAlign) {
                if (engine.adxBias === "BULLISH") bullishScore += 2;
                else if (engine.adxBias === "BEARISH") bearishScore += 2;
            }
        }
        
        if (cfg.useFibonacci) {
            const inFibZone = checkFibonacciZone(data);
            if (inFibZone) {
                if (engine.bias === "BULLISH") bullishScore += 1;
                else if (engine.bias === "BEARISH") bearishScore += 1;
            }
        }
        
        if (cfg.usePriceAction) {
            const paBullish = checkPriceAction(data);
            if (paBullish) bullishScore += 1;
            else if (!paBullish && price < ema21) bearishScore += 1;
        }
        
        if (bullishScore >= 3 && bullishScore > bearishScore) return "BULLISH";
        if (bearishScore >= 3 && bearishScore > bullishScore) return "BEARISH";
        return "NEUTRAL";
    }
    
    function detectOrderBlocks() {
        if (candleData.length < 20) return [];
        const avgVolume = candleData.slice(-20).reduce((s,d)=>s+d.v,0)/20;
        const blocks = [];
        for (let i=5; i<candleData.length-2; i++) {
            const candle = candleData[i];
            const prev = candleData[i-1];
            const bodyRange = Math.abs(candle.c - candle.o);
            const totalRange = candle.h - candle.l;
            const isImpulsive = (totalRange>0) && (bodyRange/totalRange) >= 0.6 && candle.v >= avgVolume * 1.5;
            if (isImpulsive && prev.c < prev.o && candle.c > candle.o && candle.c > prev.h) {
                const obLow = Math.min(prev.l, candleData[i-2]?.l || prev.l);
                const obHigh = prev.h;
                const strength = Math.min(10, Math.floor((candle.v/avgVolume)*3) + 2);
                blocks.push({ type: 'BULLISH', low: obLow, high: obHigh, price: (obLow+obHigh)/2, strength, mitigated: false });
            }
            if (isImpulsive && prev.c > prev.o && candle.c < candle.o && candle.c < prev.l) {
                const obHigh = Math.max(prev.h, candleData[i-2]?.h || prev.h);
                const obLow = prev.l;
                const strength = Math.min(10, Math.floor((candle.v/avgVolume)*3) + 2);
                blocks.push({ type: 'BEARISH', low: obLow, high: obHigh, price: (obLow+obHigh)/2, strength, mitigated: false });
            }
        }
        return blocks;
    }
    
    function evaluateOB(price) {
        const p = safeValue(price,0);
        const relevant = orderBlocks.filter(b=>!b.mitigated);
        if (!relevant.length) return { hasOB:false, score:0, strength:'NONE', block:null, mitigation:0, isActive:false };
        let best=null, maxScore=0, mitigation=0, isActive=false;
        for (const b of relevant) {
            let score = b.strength;
            const inZone = p>=b.low && p<=b.high;
            if ((engine.bias==="BULLISH" && b.type==='BULLISH') || (engine.bias==="BEARISH" && b.type==='BEARISH')) score += 3;
            if (inZone) { score += 4; mitigation = ((p-b.low)/(b.high-b.low))*100; isActive=true; }
            else if (p >= b.low - (b.high-b.low)*0.3 && p <= b.high + (b.high-b.low)*0.3) score += 1;
            if (score > maxScore) { maxScore=score; best=b; }
        }
        maxScore = Math.min(10, maxScore);
        if (best) return { hasOB:true, score:maxScore, strength: maxScore>=7?'STRONG':(maxScore>=4?'MEDIUM':'WEAK'), block:best, mitigation:Math.min(100,Math.max(0,mitigation)), isActive };
        return { hasOB:false, score:0, strength:'NONE', block:null, mitigation:0, isActive:false };
    }
    
    function calculateADX() {
        if (candleData.length < 28) return 15;
        const period=14;
        let tr=[], plusDM=[], minusDM=[];
        for (let i=1; i<candleData.length; i++) {
            const h=candleData[i].h, l=candleData[i].l, ph=candleData[i-1].h, pl=candleData[i-1].l, pc=candleData[i-1].c;
            tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
            const upMove = h-ph, downMove = pl-l;
            if (upMove > downMove && upMove>0) { plusDM.push(upMove); minusDM.push(0); }
            else if (downMove > upMove && downMove>0) { plusDM.push(0); minusDM.push(downMove); }
            else { plusDM.push(0); minusDM.push(0); }
        }
        let atr = tr.slice(0,period).reduce((a,b)=>a+b,0);
        let pDM = plusDM.slice(0,period).reduce((a,b)=>a+b,0);
        let mDM = minusDM.slice(0,period).reduce((a,b)=>a+b,0);
        let dxValues=[];
        let lastPDI=0, lastMDI=0;
        for (let i=period; i<tr.length; i++) {
            atr = (atr*(period-1)+tr[i])/period;
            pDM = (pDM*(period-1)+plusDM[i])/period;
            mDM = (mDM*(period-1)+minusDM[i])/period;
            lastPDI = atr>0 ? (pDM/atr)*100 : 0;
            lastMDI = atr>0 ? (mDM/atr)*100 : 0;
            const dx = (lastPDI+lastMDI)>0 ? (Math.abs(lastPDI-lastMDI)/(lastPDI+lastMDI))*100 : 0;
            dxValues.push(dx);
        }
        let adxValue;
        if (dxValues.length>=period) {
            let smoothedADX = dxValues.slice(0,period).reduce((a,b)=>a+b,0)/period;
            for (let i=period; i<dxValues.length; i++) smoothedADX = (smoothedADX*(period-1)+dxValues[i])/period;
            adxValue = smoothedADX;
        } else adxValue=15;
        adxValue = Math.max(5, Math.min(100, adxValue));
        engine.plusDI = Math.round(lastPDI);
        engine.minusDI = Math.round(lastMDI);
        engine.adxBias = lastPDI>lastMDI ? "BULLISH" : (lastMDI>lastPDI ? "BEARISH" : "NEUTRAL");
        return adxValue;
    }
    
    function computeRSI() {
        if (candleData.length<15) return 50;
        const closes = candleData.map(c=>c.c);
        let gains=[], losses=[];
        for (let i=1; i<closes.length; i++) {
            const diff = closes[i]-closes[i-1];
            gains.push(diff>0?diff:0);
            losses.push(diff<0?-diff:0);
        }
        let avgG = gains.slice(0,14).reduce((a,b)=>a+b,0)/14;
        let avgL = losses.slice(0,14).reduce((a,b)=>a+b,0)/14;
        for (let i=14; i<gains.length; i++) {
            avgG = (avgG*13+gains[i])/14;
            avgL = (avgL*13+losses[i])/14;
        }
        return avgL===0?100:100-(100/(1+avgG/avgL));
    }

    // Fungsi untuk mendapatkan OB yang akan ditampilkan (hanya yang belum termitigasi dan searah sinyal)
    function getDisplayOB(active, action, currentPrice) {
        if (!orderBlocks.length) return null;
        
        if (active === 'conservative' || active === 'sniper' || active === 'retail') {
            const targetDirection = (action === "BUY") ? "BULLISH" : "BEARISH";
            
            // Cari OB yang searah sinyal, belum termitigasi, dan masih valid (belum dilewati harga)
            const validOB = orderBlocks.find(ob => {
                if (ob.type !== targetDirection) return false;
                if (ob.mitigated) return false;
                
                // Cek apakah OB masih valid (belum dilewati harga)
                // Bullish OB: harga harus di atas OB (support)
                // Bearish OB: harga harus di bawah OB (resistance)
                if (ob.type === 'BULLISH' && currentPrice < ob.low) return false;
                if (ob.type === 'BEARISH' && currentPrice > ob.high) return false;
                
                return true;
            });
            
            if (validOB) return validOB;
            
            // Jika tidak ada OB yang valid, cari OB dengan skor tertinggi (tanpa paksaan arah)
            const bestOB = [...orderBlocks].sort((a,b) => b.strength - a.strength)[0];
            return bestOB || null;
        }
        
        // Tidak ada sinyal aktif: tampilkan OB dengan skor tertinggi
        const bestOB = [...orderBlocks].sort((a,b) => b.strength - a.strength)[0];
        return bestOB || null;
    }
    
    function updateLevels(active, action) {
        const { swingHigh, swingLow } = findSwingPoints();
        engine.swingHigh = swingHigh;
        engine.swingLow = swingLow;
        const range = swingHigh - swingLow;
        if (range <= 0) return;
        const price = lastPrice;
        
        let levelBias;
        if (active === 'conservative' || active === 'sniper' || active === 'retail') {
            levelBias = (action === "BUY") ? "BULLISH" : "BEARISH";
        } else {
            levelBias = price > (swingHigh+swingLow)/2 ? "BULLISH" : "BEARISH";
        }
        engine.bias = levelBias;
        
        const f618 = levelBias === "BULLISH" ? swingLow + range*0.618 : swingHigh - range*0.618;
        const f786 = levelBias === "BULLISH" ? swingLow + range*0.786 : swingHigh - range*0.786;
        const atr = calculateATR(getConfig().atrPeriod);
        engine.atr = atr;
        const entryFactor = getConfig().entryZoneATRFactor;
        engine.entryZoneLow = Math.min(f618, f786) - atr * entryFactor;
        engine.entryZoneHigh = Math.max(f618, f786) + atr * entryFactor;
        engine.tp = levelBias === "BULLISH" ? swingHigh + range*0.27 : swingLow - range*0.27;
        engine.sl = levelBias === "BULLISH" ? engine.entryZoneLow - atr * getConfig().slATRFactor : engine.entryZoneHigh + atr * getConfig().slATRFactor;
        
        const prec = getPrecision();
        UI.swingHigh.textContent = swingHigh.toFixed(prec);
        UI.swingLow.textContent = swingLow.toFixed(prec);
        UI.entryZoneLow.textContent = engine.entryZoneLow.toFixed(prec);
        UI.entryZoneHigh.textContent = engine.entryZoneHigh.toFixed(prec);
        UI.tpValue.textContent = engine.tp.toFixed(prec);
        UI.slValue.textContent = engine.sl.toFixed(prec);
        UI.atrValue.textContent = atr.toFixed(prec);
        const rangePoints = currentPair === "XAUUSDT" ? range.toFixed(2) : range.toFixed(1);
        UI.rangeValue.textContent = `${rangePoints} pts`;
    }
    
    function updateOBUI(price, active, action) {
        const p = safeValue(price, 0);
        const prec = getPrecision();
        
        // Gunakan fungsi getDisplayOB untuk mendapatkan OB yang tepat
        const displayOB = getDisplayOB(active, action, p);
        
        if (displayOB) {
            const b = displayOB;
            activeOB = b;
            UI.obType.textContent = b.type === 'BULLISH' ? '🟢 BULL' : '🔴 BEAR';

            if (p >= b.high) fill = 100;
            else if (p <= b.low) fill = 0;

            // Hitung ulang skor untuk OB yang ditampilkan
            let score = b.strength;
            const inZone = p >= b.low && p <= b.high;
            if ((engine.bias === "BULLISH" && b.type === 'BULLISH') || (engine.bias === "BEARISH" && b.type === 'BEARISH')) score += 3;
            if (inZone) score += 4;
            score = Math.min(10, score);
            const strengthLabel = score >= 7 ? 'STRONG' : (score >= 4 ? 'MEDIUM' : 'WEAK');
            const mitigation = inZone ? ((p - b.low) / (b.high - b.low)) * 100 : (p > b.high ? 100 : 0);
            
            UI.obStrength.textContent = `${score.toFixed(1)} (${strengthLabel})`;
            UI.obMitigation.textContent = inZone ? `${Math.min(100, Math.max(0, mitigation)).toFixed(0)}%` : (p > b.high ? '100%' : '0%');
            UI.obDistance.textContent = Math.abs(p - b.price).toFixed(prec);
        } else {
            UI.obType.textContent = 'SCANNING';
            UI.obBias.textContent = 'NEUTRAL';
            UI.obBias.className = 'ob-bias';
            UI.obHigh.textContent = UI.obLow.textContent = UI.obMid.textContent = '—';
            UI.obRangeFill.style.width = '0%';
            UI.obStrength.textContent = UI.obMitigation.textContent = UI.obDistance.textContent = '—';
        }

    function updateDecision() {
        if (isDataStale) {
            UI.decision.textContent = 'DATA STALE';
            UI.decision.style.color = 'var(--warning)';
            UI.signalBar.style.background = 'rgba(220,38,38,0.1)';
            return;
        }
        const p = lastPrice;
        const config = getConfig();
        const prec = getPrecision();
        engine.ema21 = calculateEMA(candleData, 21);
        engine.adx = calculateADX();
        
        const { swingHigh, swingLow } = findSwingPoints();
        const tempBias = p > (swingHigh+swingLow)/2 ? "BULLISH" : "BEARISH";
        engine.bias = tempBias;
        
        updateLevels(null, null);
        obEvaluation = evaluateOB(p);
        factorStatus.ob = obEvaluation.hasOB && obEvaluation.score >= config.minOBStrength;
        const rsi = computeRSI();
        
        UI.rsiValue.textContent = rsi.toFixed(1);
        UI.rsiFill.style.width = Math.min(100, Math.max(0, rsi)) + '%';
        UI.rsiFill.className = 'rsi-fill';
        if (rsi<config.rsiOversold) UI.rsiFill.classList.add('oversold');
        else if (rsi>config.rsiOverbought) UI.rsiFill.classList.add('overbought');
        else UI.rsiFill.classList.add('neutral');
        
        UI.emaValue.textContent = engine.ema21.toFixed(prec);
        UI.emaDistance.textContent = `${(p>engine.ema21?'+':'')}${(p-engine.ema21).toFixed(prec)} (${((p-engine.ema21)/engine.ema21*100).toFixed(2)}%)`;
        UI.emaTrend.textContent = p>engine.ema21?'▲':'▼';
        UI.emaTrend.style.color = p>engine.ema21?'var(--accent-green)':'var(--accent-red)';
        UI.adxValue.textContent = Math.round(engine.adx);
        if (engine.adx<config.adxThreshold) UI.adxValue.classList.add('adx-warning');
        else UI.adxValue.classList.remove('adx-warning');
        UI.diValues.textContent = `+DI ${engine.plusDI} | -DI ${engine.minusDI}`;
        UI.adxTrend.textContent = engine.plusDI>engine.minusDI?'▲':'▼';
        UI.adxTrend.style.color = engine.plusDI>engine.minusDI?'var(--accent-green)':'var(--accent-red)';
        
        const inZoneTemp = p >= engine.entryZoneLow && p <= engine.entryZoneHigh;
        const adxValid = engine.adx >= config.adxThreshold;
        factorStatus.f1 = engine.bias !== "NEUTRAL";
        factorStatus.f3 = adxValid && (inZoneTemp || obEvaluation.isActive);
        const obAligned = obEvaluation.hasOB && ((engine.adxBias==="BULLISH" && activeOB?.type==='BULLISH') || (engine.adxBias==="BEARISH" && activeOB?.type==='BEARISH'));
        
        let score = 0;
        if (factorStatus.f1) score+=3;
        if (factorStatus.f2) score+=2;
        if (factorStatus.f3) score+=2;
        if (factorStatus.ob) score += obEvaluation.strength==='STRONG'?3:(obEvaluation.strength==='MEDIUM'?2:1);
        
        const direction = engine.adxBias;
        const action = direction==="BULLISH"?"BUY":"SELL";
        UI.arrow.innerHTML = direction==="BULLISH"? '▲' : '▼';
        UI.arrow.style.color = direction==="BULLISH"? 'var(--accent-green)' : 'var(--accent-red)';
        
        let active = null;
        let decisionText = '', color = '', bgColor = '';
        const isInValidZone = inZoneTemp || obEvaluation.isActive;
        
        if (!adxValid) { decisionText = `LOW ADX (${Math.round(engine.adx)}<${config.adxThreshold})`; color='var(--warning)'; bgColor='rgba(245,158,11,0.1)'; active=null; }
        else if (!isInValidZone) { decisionText = 'OUT OF ZONE'; color='var(--warning)'; bgColor='rgba(245,158,11,0.1)'; active=null; }
        else {
            if (adxValid && factorStatus.f1 && factorStatus.f2 && factorStatus.f3 && score>=8 && engine.adx>=25) {
                active = 'conservative';
                decisionText = `CONSERVATIVE ${action}`;
                color = 'var(--accent-green)';
                bgColor = 'rgba(16,185,129,0.08)';
            }
            else if (adxValid && factorStatus.f1 && factorStatus.ob && obAligned && score>=7 && inZoneTemp) {
                active = 'sniper';
                decisionText = `SNIPER ${action}`;
                color = 'var(--accent-purple)';
                bgColor = 'rgba(139,92,246,0.08)';
            }
            else if (adxValid && factorStatus.f1 && score>=5 && inZoneTemp && rsi>=40 && rsi<=60) {
                active = 'retail';
                decisionText = `RETAIL ${action}`;
                color = 'var(--accent-orange)';
                bgColor = 'rgba(245,158,11,0.08)';
            }
            else if (score>=4) { decisionText = 'WAITING'; color='var(--accent-gold)'; bgColor='var(--bg-secondary)'; active=null; }
            else { decisionText = 'NO SETUP'; color='var(--text-tertiary)'; bgColor='var(--bg-secondary)'; active=null; }
        }
        
        document.querySelectorAll('.mode-btn-large').forEach(btn => btn.classList.remove('active'));
        if (active === 'conservative') document.querySelector('[data-mode="conservative"]')?.classList.add('active');
        else if (active === 'sniper') document.querySelector('[data-mode="sniper"]')?.classList.add('active');
        else if (active === 'retail') document.querySelector('[data-mode="retail"]')?.classList.add('active');
        
        updateLevels(active, action);
        
        // Update OB UI dengan filter yang lebih ketat
        updateOBUI(p, active, action);
        
        if (active === 'conservative' || active === 'sniper' || active === 'retail') {
            UI.decision.textContent = `${action} NOW 🔥`;
        } else {
            UI.decision.textContent = decisionText;
        }
        UI.decision.style.color = color;
        UI.signalBar.style.background = bgColor;
        UI.signalBar.style.borderColor = active ? color : 'var(--border-subtle)';
        UI.levelsGrid.classList.toggle('zone-warning', !isInValidZone && adxValid);
    }
    
    function updateUI(price) {
        const p = safeValue(price,0);
        const prec = getPrecision();
        const fixed = p.toFixed(prec);
        const parts = fixed.split('.');
        UI.priceMain.innerHTML = `${parts[0]}<span class="price-decimal">.${parts[1]||'00'}</span>`;
        UI.priceMain.style.color = p>prevPrice ? 'var(--accent-green)' : (p<prevPrice ? 'var(--accent-red)' : 'var(--text-primary)');
        if (prevPrice>0) {
            const change = p-prevPrice;
            const pct = (change/prevPrice)*100;
            UI.priceChange.innerHTML = `${change>0?'+':''}${change.toFixed(prec)} (${pct.toFixed(2)}%)`;
            UI.priceChange.style.color = change>0?'var(--accent-green)':'var(--accent-red)';
        }
        lastPrice = p;
        prevPrice = p;
        updateDecision();
    }
    
    function safeValue(val, fallback=0) { return (typeof val==='number' && !isNaN(val) && isFinite(val)) ? val : fallback; }
    
    function updateWSStatus(status, message) {
        if (!UI.dot || !UI.text) return;
        UI.dot.className = 'status-dot';
        if (status==='live') { UI.dot.classList.add('live'); UI.text.innerText=message||'LIVE'; reconnectDelay=1000; isUsingFallback=false; isDataStale=false; }
        else if (status==='connecting') { UI.dot.classList.add('connecting'); UI.text.innerText=message||'CONNECTING'; }
        else if (status==='reconnect') { UI.dot.classList.add('reconnect'); UI.text.innerText=message||'RECONNECT'; }
        else if (status==='fallback') { UI.dot.classList.add('fallback'); UI.text.innerText=message||'FALLBACK'; isUsingFallback=true; }
        else if (status==='stale') { UI.dot.classList.add('stale'); UI.text.innerText=message||'DATA STALE'; isDataStale=true; }
        else { UI.dot.classList.add('offline'); UI.text.innerText=message||'OFFLINE'; }
        if (UI.signalBar) UI.signalBar.classList.toggle('stale-warning', isDataStale);
    }
    
    function cleanupWebSocket() {
        if (wsConnection) {
            isManualDisconnect=true;
            try { wsConnection.onopen=wsConnection.onmessage=wsConnection.onclose=wsConnection.onerror=null; if (wsConnection.readyState===WebSocket.OPEN || wsConnection.readyState===WebSocket.CONNECTING) wsConnection.close(); } catch(e) {}
            wsConnection=null;
        }
        setTimeout(()=>{ isManualDisconnect=false; },100);
    }
    
    async function fetchKlines() {
        try {
            const resp = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${currentTF}&limit=150`);
            const data = await resp.json();
            if (Array.isArray(data)) {
                candleData = data.map(d => ({ t:d[0], o:parseFloat(d[1]), h:parseFloat(d[2]), l:parseFloat(d[3]), c:parseFloat(d[4]), v:parseFloat(d[5]) }));
                if (candleData.length) {
                    lastPrice = prevPrice = candleData[candleData.length-1].c;
                    orderBlocks = detectOrderBlocks();
                    updateUI(lastPrice);
                }
                return true;
            }
        } catch(e) { console.warn(e); }
        return false;
    }
    
    async function fetchPriceREST() {
        try {
            const resp = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${currentPair}`);
            const data = await resp.json();
            if (data?.price) {
                const price = parseFloat(data.price);
                if (price>0 && (Date.now()-lastWSMessageTime>3000 || isUsingFallback)) {
                    lastPriceUpdateTime = Date.now();
                    updateUI(price);
                }
            }
        } catch(e) {}
    }
    
    function initWebSocket() {
        cleanupWebSocket();
        updateWSStatus('connecting','CONNECTING');
        const streamName = `${currentPair.toLowerCase()}@kline_${currentTF}`;
        const wsUrl = `wss://fstream.binance.com/ws/${streamName}`;
        try {
            wsConnection = new WebSocket(wsUrl);
            wsConnection.onopen = () => {
                console.log(`✅ WebSocket connected: ${currentPair} @ ${currentTF}`);
                reconnectDelay=1000;
                lastWSMessageTime=lastPriceUpdateTime=Date.now();
                isUsingFallback=false;
                isDataStale=false;
                updateWSStatus('live', `LIVE ${currentTF}`);
            };
            wsConnection.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg?.k) {
                        const k = msg.k;
                        const price = parseFloat(k.c);
                        const high = parseFloat(k.h);
                        const low = parseFloat(k.l);
                        const open = parseFloat(k.o);
                        const isClosed = k.x;
                        if (price>0) {
                            lastWSMessageTime = lastPriceUpdateTime = Date.now();
                            if (isUsingFallback) updateWSStatus('live', `LIVE ${currentTF}`);
                            if (isDataStale) updateWSStatus('live', `LIVE ${currentTF}`);
                            if (candleData.length) {
                                const lc = candleData[candleData.length-1];
                                if (isClosed) {
                                    candleData.push({ t:k.t, o:open, h:high, l:low, c:price, v:parseFloat(k.v) });
                                    if (candleData.length>150) candleData.shift();
                                    orderBlocks = detectOrderBlocks();
                                } else {
                                    lc.c = price;
                                    lc.h = Math.max(lc.h, high);
                                    lc.l = Math.min(lc.l, low);
                                    lc.o = lc.o || open;
                                }
                            }
                            updateUI(price);
                        }
                    }
                } catch(err) {}
            };
            wsConnection.onclose = () => {
                if (!isReloading && !isManualDisconnect) {
                    updateWSStatus('reconnect','RECONNECT');
                    if (reconnectTimer) clearTimeout(reconnectTimer);
                    reconnectTimer = setTimeout(() => {
                        if (!isReloading && !isManualDisconnect) {
                            reconnectDelay = Math.min(reconnectDelay*1.5, 30000);
                            initWebSocket();
                        }
                    }, reconnectDelay);
                }
            };
            wsConnection.onerror = () => { if (!isReloading && !isManualDisconnect) updateWSStatus('reconnect','ERROR'); };
        } catch(e) { updateWSStatus('fallback','FALLBACK'); isUsingFallback=true; }
    }
    
    let heartbeatInterval, stuckCheckInterval, restFallbackInterval;
    async function fullReload() {
        if (isReloading) return;
        isReloading=true;
        document.querySelectorAll('[data-pair],[data-tf]').forEach(b=>b.classList.add('disabled'));
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (stuckCheckInterval) clearInterval(stuckCheckInterval);
        if (restFallbackInterval) clearInterval(restFallbackInterval);
        cleanupWebSocket();
        
        document.querySelectorAll('[data-pair]').forEach(btn => {
            if (btn.getAttribute('data-pair') === currentPair) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        document.querySelectorAll('.tf-btn').forEach(btn => {
            const tf = btn.getAttribute('data-tf');
            if (tf === currentTF) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        updateWSStatus('connecting','LOADING');
        engine = { swingHigh:0, swingLow:0, bias:"NEUTRAL", adxBias:"NEUTRAL", adx:0, ema21:0, plusDI:0, minusDI:0, atr:0, entryZoneLow:0, entryZoneHigh:0, tp:0, sl:0 };
        factorStatus = { f1:false, f2:false, f3:false, ob:false };
        orderBlocks=[]; activeOB=null;
        await fetchKlines();
        await fetchMTFData();
        initWebSocket();
        heartbeatInterval = setInterval(() => { if (wsConnection?.readyState===WebSocket.OPEN) try { wsConnection.send(JSON.stringify({method:"ping"})); } catch(e) {} }, 30000);
        stuckCheckInterval = setInterval(() => {
            const now=Date.now();
            const timeSinceLastPrice = now-lastPriceUpdateTime;
            if (timeSinceLastPrice>10000 && lastPrice>0 && !isDataStale) updateWSStatus('stale');
            else if (isDataStale && timeSinceLastPrice<5000) updateWSStatus(isUsingFallback?'fallback':'live');
            const timeSinceLastMsg = now-lastWSMessageTime;
            if (wsConnection?.readyState===WebSocket.OPEN && timeSinceLastMsg>10000 && !isUsingFallback && !isReloading) { updateWSStatus('fallback'); isUsingFallback=true; fetchPriceREST(); }
            if (wsConnection?.readyState!==WebSocket.OPEN && !isReloading && !isManualDisconnect) updateWSStatus('reconnect');
        }, 5000);
        restFallbackInterval = setInterval(fetchPriceREST, 5000);
        document.querySelectorAll('[data-pair],[data-tf]').forEach(b=>b.classList.remove('disabled'));
        isReloading=false;
    }
    
    document.querySelectorAll('[data-pair]').forEach(btn => btn.onclick = () => { if(!isReloading){ currentPair=btn.getAttribute('data-pair'); localStorage.setItem('lastPair',currentPair); fullReload(); } });
    document.querySelectorAll('.tf-btn').forEach(btn => btn.onclick = () => { if(!isReloading){ currentTF=btn.getAttribute('data-tf'); localStorage.setItem('lastTF',currentTF); fullReload(); } });
    window.copySwingHL = () => { navigator.clipboard?.writeText(`Swing H: ${UI.swingHigh.textContent} | L: ${UI.swingLow.textContent}`); };
    window.copyEntryZone = () => { navigator.clipboard?.writeText(`Entry Zone: ${UI.entryZoneLow.textContent} / ${UI.entryZoneHigh.textContent}`); };
    window.smartCopy = (id) => { const el = document.getElementById(id); if(el){ navigator.clipboard?.writeText(el.textContent.trim()); el.classList.add('copied'); setTimeout(()=>el.classList.remove('copied'),300); } };
    setInterval(() => { const now=new Date(); UI.clock.textContent=now.toLocaleTimeString('id-ID'); UI.date.textContent=`${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`; UI.session.textContent = now.getHours()>=7 && now.getHours()<14 ? 'ASIA' : (now.getHours()>=14 && now.getHours()<20 ? 'LONDON' : 'NY'); }, 1000);
    setInterval(() => { fetchMTFData(); }, 120000);
    fullReload();
})();
</script>
